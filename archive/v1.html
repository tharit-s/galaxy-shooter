<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galaxy Shooter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="game" width="600" height="650"></canvas>
<script>
(function() {
'use strict';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 600, H = 650;

// ============================
// AUDIO (Web Audio API)
// ============================
let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
  if (!audioCtx || audioCtx.state !== 'running') return;
  try {
    const now = audioCtx.currentTime;
    switch (type) {
      case 'shoot': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(880, now);
        osc.frequency.exponentialRampToValueAtTime(1300, now + 0.05);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now); osc.stop(now + 0.1);
        break;
      }
      case 'enemyDeath': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(150, now + 0.2);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now); osc.stop(now + 0.2);
        break;
      }
      case 'playerHit': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, now);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now); osc.stop(now + 0.3);
        break;
      }
      case 'bossHit': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(220, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now); osc.stop(now + 0.15);
        break;
      }
      case 'powerup': {
        const notes = [523, 659, 784, 1047];
        notes.forEach((freq, i) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now + i * 0.08);
          gain.gain.setValueAtTime(0, now + i * 0.08);
          gain.gain.linearRampToValueAtTime(0.1, now + i * 0.08 + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.12);
          osc.connect(gain).connect(audioCtx.destination);
          osc.start(now + i * 0.08); osc.stop(now + i * 0.08 + 0.12);
        });
        break;
      }
    }
  } catch (e) { /* ignore audio errors */ }
}

let bgDrone = null;
function startDrone() {
  if (!audioCtx || bgDrone) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(55, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    bgDrone = { osc, gain };
  } catch (e) {}
}
function stopDrone() {
  if (bgDrone) {
    try { bgDrone.osc.stop(); } catch (e) {}
    bgDrone = null;
  }
}

// ============================
// GAME STATE
// ============================
const STATE = { START: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3, LEVELUP: 4 };
let gameState = STATE.START;
let score = 0;
let hiScore = parseInt(localStorage.getItem('galaxyShooterHiScore')) || 0;
let lives = 3;
let wave = 1;
let levelUpTimer = 0;

// ============================
// INPUT
// ============================
const keys = {};
document.addEventListener('keydown', function(e) {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (e.code === 'KeyP') {
    if (gameState === STATE.PLAYING) { gameState = STATE.PAUSED; return; }
    if (gameState === STATE.PAUSED) { gameState = STATE.PLAYING; return; }
  }
  if (e.code === 'Space') {
    initAudio();
    if (gameState === STATE.START) { startGame(); return; }
    if (gameState === STATE.GAMEOVER) { startGame(); return; }
  }
});
document.addEventListener('keyup', function(e) { keys[e.code] = false; });

// ============================
// BACKGROUND: STARS & NEBULA
// ============================
const stars = [];
for (let i = 0; i < 100; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    size: Math.random() * 2 + 0.5,
    twinkle: Math.random() * Math.PI * 2,
    speed: Math.random() * 30 + 10
  });
}

const nebulae = [];
for (let i = 0; i < 5; i++) {
  const colors = ['#6600aa', '#003388', '#005555', '#440088', '#002266'];
  nebulae.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 140 + 80,
    color: colors[i],
    dx: (Math.random() - 0.5) * 15,
    dy: (Math.random() - 0.5) * 10
  });
}

// ============================
// PLAYER
// ============================
let player = {};

function resetPlayer() {
  player = {
    x: W / 2,
    y: H - 60,
    vx: 0,
    width: 24,
    height: 30,
    invincible: 0,
    spreadShot: 0,
    speedBoost: 0,
    shield: 0
  };
}

// ============================
// GAME OBJECTS
// ============================
let bullets = [];
let lastShotTime = 0;
let enemies = [];
let enemyBullets = [];
let enemyShootTimer = 0;
let boss = null;
let bossHPMax = 0;
let particles = [];
let powerups = [];

// Combo
let combo = 0;
let comboTimer = 0;
let comboDisplayTimer = 0;

// Screen shake
let shakeX = 0, shakeY = 0, shakeDuration = 0, shakeIntensity = 0;

// Flash
let flashAlpha = 0;

// ============================
// GAME FUNCTIONS
// ============================
function startGame() {
  gameState = STATE.PLAYING;
  score = 0;
  lives = 3;
  wave = 1;
  resetPlayer();
  bullets = [];
  enemies = [];
  enemyBullets = [];
  particles = [];
  powerups = [];
  boss = null;
  combo = 0;
  comboTimer = 0;
  comboDisplayTimer = 0;
  shakeX = 0; shakeY = 0; shakeDuration = 0; shakeIntensity = 0;
  flashAlpha = 0;
  enemyShootTimer = 0;
  spawnWave();
  startDrone();
}

function spawnWave() {
  if (wave % 3 === 0) {
    // Boss wave
    const hp = 20 + wave * 5;
    bossHPMax = hp;
    boss = {
      x: W / 2, y: -80, targetY: 70,
      hp: hp, maxHp: hp,
      width: 80, height: 60,
      vx: 1.5, shootTimer: 0, phase: 0,
      entered: false
    };
  } else {
    const count = wave === 1 ? 8 : (wave <= 2 ? 12 : 16);
    const speedMult = 1 + (wave - 1) * 0.12;
    const cols = Math.min(count, 8);
    const rows = Math.ceil(count / cols);
    let spawned = 0;
    for (let r = 0; r < rows && spawned < count; r++) {
      for (let c = 0; c < cols && spawned < count; c++) {
        const typeRoll = Math.random();
        let enemy;
        const baseX = 60 + c * 65;
        const baseY = -40 - r * 55;
        if (typeRoll < 0.4) {
          enemy = { type: 'A', x: baseX, y: baseY, size: 12, color: '#ff4444', hp: 1, points: 10, speed: 80 * speedMult, phase: Math.random() * Math.PI * 2, amplitude: 40 + Math.random() * 20 };
        } else if (typeRoll < 0.75) {
          enemy = { type: 'B', x: baseX, y: baseY, size: 16, color: '#ff8800', hp: 2, points: 20, speed: 55 * speedMult, phase: Math.random() * Math.PI * 2, amplitude: 30 + Math.random() * 20 };
        } else {
          enemy = { type: 'C', x: baseX, y: baseY, size: 22, color: '#ffcc00', hp: 3, points: 30, speed: 35 * speedMult, phase: Math.random() * Math.PI * 2, amplitude: 25 + Math.random() * 15 };
        }
        enemy.baseX = baseX;
        enemy.startY = baseY;
        enemy.time = 0;
        enemies.push(enemy);
        spawned++;
      }
    }
  }
}

function triggerShake(intensity, duration) {
  shakeIntensity = Math.max(shakeIntensity, intensity);
  shakeDuration = Math.max(shakeDuration, duration);
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 200 + 50;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: Math.random() * 2 + 1.5,
      color: color,
      size: Math.random() * 3 + 1
    });
  }
}

function maybeSpawnPowerup(x, y) {
  if (Math.random() > 0.15) return;
  const types = ['shield', 'spread', 'speed'];
  const type = types[Math.floor(Math.random() * types.length)];
  powerups.push({ x: x, y: y, type: type, vy: 80, size: 14, time: 0 });
}

// ============================
// UPDATE
// ============================
function update(dt) {
  // Animate nebulae always
  for (let i = 0; i < nebulae.length; i++) {
    const n = nebulae[i];
    n.x += n.dx * dt;
    n.y += n.dy * dt;
    if (n.x < -150 || n.x > W + 150) n.dx *= -1;
    if (n.y < -150 || n.y > H + 150) n.dy *= -1;
  }

  // Animate stars always
  for (let i = 0; i < stars.length; i++) {
    const s = stars[i];
    s.twinkle += dt * 3;
    s.y += s.speed * dt;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  }

  // Update particles always (for visual continuity)
  particles = particles.filter(function(p) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 100 * dt; // slight gravity
    p.life -= p.decay * dt;
    return p.life > 0;
  });

  if (gameState === STATE.LEVELUP) {
    levelUpTimer -= dt;
    if (levelUpTimer <= 0) {
      gameState = STATE.PLAYING;
      spawnWave();
    }
    return;
  }

  if (gameState !== STATE.PLAYING) return;

  // Screen shake
  if (shakeDuration > 0) {
    shakeDuration -= dt * 1000;
    shakeX = (Math.random() - 0.5) * shakeIntensity * 2;
    shakeY = (Math.random() - 0.5) * shakeIntensity * 2;
    if (shakeDuration <= 0) {
      shakeX = 0; shakeY = 0; shakeIntensity = 0;
    }
  }

  // Flash
  if (flashAlpha > 0) flashAlpha -= dt * 3;
  if (flashAlpha < 0) flashAlpha = 0;

  // Player movement (smooth acceleration)
  const maxSpeed = player.speedBoost > 0 ? 450 : 300;
  const accel = 1800;
  const friction = 10;

  if (keys['ArrowLeft'] || keys['KeyA']) {
    player.vx -= accel * dt;
  } else if (keys['ArrowRight'] || keys['KeyD']) {
    player.vx += accel * dt;
  } else {
    // Apply friction
    if (Math.abs(player.vx) < 20) {
      player.vx = 0;
    } else {
      player.vx *= Math.max(0, 1 - friction * dt);
    }
  }

  // Clamp speed
  if (player.vx > maxSpeed) player.vx = maxSpeed;
  if (player.vx < -maxSpeed) player.vx = -maxSpeed;

  player.x += player.vx * dt;
  if (player.x < player.width) { player.x = player.width; player.vx = 0; }
  if (player.x > W - player.width) { player.x = W - player.width; player.vx = 0; }

  // Timers
  if (player.invincible > 0) player.invincible -= dt;
  if (player.spreadShot > 0) player.spreadShot -= dt;
  if (player.speedBoost > 0) player.speedBoost -= dt;
  if (player.shield > 0) player.shield -= dt;

  // Shooting
  const maxBullets = player.spreadShot > 0 ? 9 : 2;
  const now = performance.now();
  if (keys['Space'] && bullets.length < maxBullets && (now - lastShotTime > 300)) {
    lastShotTime = now;
    if (player.spreadShot > 0) {
      bullets.push({ x: player.x - 8, y: player.y - 20, vx: -100, vy: -500 });
      bullets.push({ x: player.x, y: player.y - 22, vx: 0, vy: -520 });
      bullets.push({ x: player.x + 8, y: player.y - 20, vx: 100, vy: -500 });
    } else {
      bullets.push({ x: player.x, y: player.y - 20, vx: 0, vy: -520 });
    }
    playSound('shoot');
  }

  // Update bullets
  bullets = bullets.filter(function(b) {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    return b.y > -20 && b.x > -20 && b.x < W + 20;
  });

  // Update enemies
  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    e.time += dt;
    e.y = e.startY + e.speed * e.time;
    e.phase += dt * 2;
    e.x = e.baseX + Math.sin(e.phase) * e.amplitude;
  }
  enemies = enemies.filter(function(e) { return e.y < H + 50; });

  // Enemy shooting
  enemyShootTimer += dt;
  if (enemyShootTimer > 2) {
    enemyShootTimer = 0;
    const bottomEnemies = enemies.filter(function(e) { return e.y > 80; });
    if (bottomEnemies.length > 0) {
      const shooter = bottomEnemies[Math.floor(Math.random() * bottomEnemies.length)];
      const angle = Math.atan2(player.y - shooter.y, player.x - shooter.x);
      enemyBullets.push({
        x: shooter.x,
        y: shooter.y + shooter.size,
        vx: Math.cos(angle) * 200,
        vy: Math.sin(angle) * 200
      });
    }
  }

  // Update enemy bullets
  enemyBullets = enemyBullets.filter(function(b) {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    return b.y < H + 20 && b.y > -20 && b.x > -20 && b.x < W + 20;
  });

  // Boss update
  if (boss) {
    if (!boss.entered) {
      boss.y += 80 * dt;
      if (boss.y >= boss.targetY) {
        boss.y = boss.targetY;
        boss.entered = true;
      }
    } else {
      const speedFactor = 1 + (1 - boss.hp / boss.maxHp) * 2.5;
      boss.x += boss.vx * speedFactor * 100 * dt;
      if (boss.x < 80) { boss.x = 80; boss.vx = Math.abs(boss.vx); }
      if (boss.x > W - 80) { boss.x = W - 80; boss.vx = -Math.abs(boss.vx); }

      boss.shootTimer += dt;
      const shootInterval = 1.8 - (1 - boss.hp / boss.maxHp) * 0.7;
      if (boss.shootTimer > shootInterval) {
        boss.shootTimer = 0;
        for (let a = -0.4; a <= 0.4; a += 0.4) {
          const angle = Math.PI / 2 + a;
          enemyBullets.push({
            x: boss.x,
            y: boss.y + boss.height / 2,
            vx: Math.cos(angle) * 200,
            vy: Math.sin(angle) * 200
          });
        }
      }
    }
    boss.phase = (boss.phase || 0) + dt * 3;
  }

  // Bullet vs Enemy collision
  const bulletsToRemove = {};
  const enemiesToRemove = {};

  for (let bi = 0; bi < bullets.length; bi++) {
    const b = bullets[bi];
    if (bulletsToRemove[bi]) continue;

    for (let ei = 0; ei < enemies.length; ei++) {
      const e = enemies[ei];
      if (enemiesToRemove[ei]) continue;
      if (Math.abs(b.x - e.x) < e.size + 4 && Math.abs(b.y - e.y) < e.size + 4) {
        bulletsToRemove[bi] = true;
        e.hp--;
        if (e.hp <= 0) {
          enemiesToRemove[ei] = true;
          const mult = combo >= 2 ? Math.min(combo, 16) : 1;
          score += e.points * mult;
          combo++;
          comboTimer = 1.5;
          if (combo >= 2) comboDisplayTimer = 1.5;
          spawnParticles(e.x, e.y, e.color, 12);
          maybeSpawnPowerup(e.x, e.y);
          triggerShake(2, 80);
          playSound('enemyDeath');
        }
        break;
      }
    }

    // Bullet vs Boss
    if (!bulletsToRemove[bi] && boss && boss.entered) {
      if (Math.abs(b.x - boss.x) < boss.width / 2 + 4 && Math.abs(b.y - boss.y) < boss.height / 2 + 4) {
        bulletsToRemove[bi] = true;
        boss.hp--;
        triggerShake(5, 150);
        playSound('bossHit');
        spawnParticles(b.x, b.y, '#ff00ff', 6);
        if (boss.hp <= 0) {
          const mult = combo >= 2 ? Math.min(combo, 16) : 1;
          score += 500 * mult;
          combo++;
          comboTimer = 1.5;
          if (combo >= 2) comboDisplayTimer = 1.5;
          spawnParticles(boss.x, boss.y, '#ff00ff', 50);
          spawnParticles(boss.x, boss.y, '#ffff00', 30);
          spawnParticles(boss.x, boss.y, '#ffffff', 20);
          flashAlpha = 1;
          triggerShake(15, 500);
          playSound('enemyDeath');
          boss = null;
        }
      }
    }
  }

  bullets = bullets.filter(function(_, i) { return !bulletsToRemove[i]; });
  enemies = enemies.filter(function(_, i) { return !enemiesToRemove[i]; });

  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { combo = 0; }
  }
  if (comboDisplayTimer > 0) comboDisplayTimer -= dt;

  // Player collision with enemies and enemy bullets
  const isProtected = player.invincible > 0 || player.shield > 0;
  if (!isProtected) {
    let hit = false;
    for (let i = 0; i < enemies.length; i++) {
      const e = enemies[i];
      if (Math.abs(e.x - player.x) < e.size + 10 && Math.abs(e.y - player.y) < e.size + 14) {
        hit = true; break;
      }
    }
    if (!hit) {
      for (let i = 0; i < enemyBullets.length; i++) {
        const b = enemyBullets[i];
        if (Math.abs(b.x - player.x) < 14 && Math.abs(b.y - player.y) < 18) {
          hit = true; break;
        }
      }
    }
    if (hit) {
      lives--;
      player.invincible = 2;
      triggerShake(15, 500);
      playSound('playerHit');
      spawnParticles(player.x, player.y, '#00ffff', 20);
      enemyBullets = [];
      if (lives <= 0) {
        gameState = STATE.GAMEOVER;
        stopDrone();
        if (score > hiScore) {
          hiScore = score;
          localStorage.setItem('galaxyShooterHiScore', String(hiScore));
        }
      }
    }
  }

  // Power-up collection and movement
  powerups = powerups.filter(function(p) {
    p.y += p.vy * dt;
    p.time += dt;
    if (p.y > H + 20) return false;
    if (Math.abs(p.x - player.x) < 22 && Math.abs(p.y - player.y) < 22) {
      playSound('powerup');
      if (p.type === 'shield') player.shield = 5;
      else if (p.type === 'spread') player.spreadShot = 8;
      else if (p.type === 'speed') player.speedBoost = 6;
      return false;
    }
    return true;
  });

  // Check wave clear
  if (enemies.length === 0 && !boss) {
    wave++;
    gameState = STATE.LEVELUP;
    levelUpTimer = 1.5;
    if (score > hiScore) {
      hiScore = score;
      localStorage.setItem('galaxyShooterHiScore', String(hiScore));
    }
  }
}

// ============================
// DRAWING
// ============================
function drawNebula() {
  for (let i = 0; i < nebulae.length; i++) {
    const n = nebulae[i];
    const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    grad.addColorStop(0, n.color + '44');
    grad.addColorStop(0.5, n.color + '22');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawStars() {
  for (let i = 0; i < stars.length; i++) {
    const s = stars[i];
    const alpha = 0.3 + Math.sin(s.twinkle) * 0.4 + 0.3;
    ctx.fillStyle = 'rgba(255,255,255,' + alpha.toFixed(2) + ')';
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
}

function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible * 8) % 2 === 0) return;

  ctx.save();
  ctx.translate(player.x, player.y);

  // Shield aura
  if (player.shield > 0) {
    ctx.shadowBlur = 25;
    ctx.shadowColor = '#4488ff';
    ctx.strokeStyle = 'rgba(68,136,255,' + (0.5 + Math.sin(performance.now() * 0.008) * 0.3).toFixed(2) + ')';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, 26, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Ship body - sleek arrowhead
  ctx.shadowBlur = 15;
  ctx.shadowColor = '#00ffff';
  ctx.fillStyle = '#00ffff';
  ctx.beginPath();
  ctx.moveTo(0, -player.height / 2);
  ctx.lineTo(-player.width / 2 - 4, player.height / 2);
  ctx.lineTo(-player.width / 4, player.height / 3);
  ctx.lineTo(0, player.height / 2.5);
  ctx.lineTo(player.width / 4, player.height / 3);
  ctx.lineTo(player.width / 2 + 4, player.height / 2);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = '#003344';
  ctx.beginPath();
  ctx.moveTo(0, -player.height / 4);
  ctx.lineTo(-5, player.height / 6);
  ctx.lineTo(5, player.height / 6);
  ctx.closePath();
  ctx.fill();

  // Engine glow
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#00ff88';
  ctx.fillStyle = '#00ff88';
  const flicker = Math.random() * 6;
  ctx.beginPath();
  ctx.moveTo(-6, player.height / 3);
  ctx.lineTo(-2, player.height / 2 + 5 + flicker);
  ctx.lineTo(2, player.height / 2 + 5 + flicker);
  ctx.lineTo(6, player.height / 3);
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawBullets() {
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#00ff88';
  for (let i = 0; i < bullets.length; i++) {
    const b = bullets[i];
    ctx.fillStyle = '#00ff88';
    ctx.fillRect(b.x - 2, b.y, 4, 12);
    ctx.globalAlpha = 0.6;
    ctx.fillRect(b.x - 2, b.y + 12, 4, 8);
    ctx.globalAlpha = 0.3;
    ctx.fillRect(b.x - 1.5, b.y + 20, 3, 6);
    ctx.globalAlpha = 1;
  }
  ctx.shadowBlur = 0;
}

function drawEnemyBullets() {
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#ff4444';
  ctx.fillStyle = '#ff4444';
  for (let i = 0; i < enemyBullets.length; i++) {
    const b = enemyBullets[i];
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  ctx.shadowBlur = 0;
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.shadowBlur = 12;
  ctx.shadowColor = e.color;
  ctx.fillStyle = e.color;
  ctx.strokeStyle = e.color;
  ctx.lineWidth = 2;

  if (e.type === 'A') {
    // Diamond
    ctx.beginPath();
    ctx.moveTo(0, -e.size);
    ctx.lineTo(e.size * 0.7, 0);
    ctx.lineTo(0, e.size);
    ctx.lineTo(-e.size * 0.7, 0);
    ctx.closePath();
    ctx.fill();
    // Inner detail
    ctx.fillStyle = '#220000';
    ctx.beginPath();
    ctx.moveTo(0, -e.size * 0.4);
    ctx.lineTo(e.size * 0.25, 0);
    ctx.lineTo(0, e.size * 0.4);
    ctx.lineTo(-e.size * 0.25, 0);
    ctx.closePath();
    ctx.fill();
  } else if (e.type === 'B') {
    // Hexagon
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = (Math.PI / 3) * i - Math.PI / 2;
      const px = Math.cos(angle) * e.size;
      const py = Math.sin(angle) * e.size;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    // Inner ring
    ctx.strokeStyle = '#331100';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, e.size * 0.5, 0, Math.PI * 2);
    ctx.stroke();
  } else {
    // Octagon
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI / 4) * i - Math.PI / 8;
      const px = Math.cos(angle) * e.size;
      const py = Math.sin(angle) * e.size;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    // Inner details
    ctx.fillStyle = '#443300';
    ctx.beginPath();
    ctx.arc(0, 0, e.size * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(0, 0, e.size * 0.2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawBoss() {
  if (!boss) return;
  ctx.save();
  ctx.translate(boss.x, boss.y);

  const pulse = Math.sin(boss.phase || 0) * 8 + 20;
  ctx.shadowBlur = pulse;
  ctx.shadowColor = '#ff00ff';

  // Main body - complex ship
  ctx.fillStyle = '#ff00ff';
  ctx.beginPath();
  ctx.moveTo(0, -boss.height / 2);
  ctx.lineTo(boss.width * 0.3, -boss.height * 0.35);
  ctx.lineTo(boss.width / 2, -boss.height * 0.1);
  ctx.lineTo(boss.width / 2 + 18, 0);
  ctx.lineTo(boss.width / 2, boss.height * 0.2);
  ctx.lineTo(boss.width * 0.35, boss.height * 0.4);
  ctx.lineTo(boss.width * 0.15, boss.height / 2);
  ctx.lineTo(-boss.width * 0.15, boss.height / 2);
  ctx.lineTo(-boss.width * 0.35, boss.height * 0.4);
  ctx.lineTo(-boss.width / 2, boss.height * 0.2);
  ctx.lineTo(-boss.width / 2 - 18, 0);
  ctx.lineTo(-boss.width / 2, -boss.height * 0.1);
  ctx.lineTo(-boss.width * 0.3, -boss.height * 0.35);
  ctx.closePath();
  ctx.fill();

  // Wings
  ctx.fillStyle = '#cc00cc';
  ctx.beginPath();
  ctx.moveTo(-boss.width / 2 - 18, 0);
  ctx.lineTo(-boss.width / 2 - 5, -15);
  ctx.lineTo(-boss.width / 2 - 5, 15);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(boss.width / 2 + 18, 0);
  ctx.lineTo(boss.width / 2 + 5, -15);
  ctx.lineTo(boss.width / 2 + 5, 15);
  ctx.closePath();
  ctx.fill();

  // Core
  ctx.shadowBlur = 15;
  ctx.shadowColor = '#ffffff';
  ctx.fillStyle = '#ff88ff';
  ctx.beginPath();
  ctx.arc(0, 0, 14, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(0, 0, 6, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();

  // Health bar at top
  const barW = 240;
  const barH = 18;
  const barX = (W - barW) / 2;
  const barY = 12;
  ctx.fillStyle = '#222';
  ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
  ctx.fillStyle = '#440000';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = '#ff0044';
  ctx.shadowBlur = 6;
  ctx.shadowColor = '#ff0044';
  ctx.fillRect(barX, barY, barW * (boss.hp / boss.maxHp), barH);
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#ff00ff';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX - 1, barY - 1, barW + 2, barH + 2);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('BOSS HP: ' + boss.hp + ' / ' + boss.maxHp, W / 2, barY + barH / 2);
}

function drawParticles() {
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.shadowBlur = 4;
    ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawPowerups() {
  for (let i = 0; i < powerups.length; i++) {
    const p = powerups[i];
    ctx.save();
    ctx.translate(p.x, p.y);
    let color, letter;
    if (p.type === 'shield') { color = '#4488ff'; letter = 'S'; }
    else if (p.type === 'spread') { color = '#ffcc00'; letter = 'W'; }
    else { color = '#00ff44'; letter = 'V'; }

    // Pulsing glow
    const pulse = Math.sin(p.time * 5) * 0.3 + 0.7;
    ctx.shadowBlur = 18 * pulse;
    ctx.shadowColor = color;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(0, 0, p.size, 0, Math.PI * 2);
    ctx.stroke();

    // Fill with low opacity
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = color;
    ctx.fill();
    ctx.globalAlpha = 1;

    // Letter
    ctx.shadowBlur = 8;
    ctx.fillStyle = color;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(letter, 0, 1);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawHUD() {
  ctx.shadowBlur = 0;
  ctx.font = 'bold 16px monospace';
  ctx.textBaseline = 'top';

  // Score - left
  ctx.fillStyle = '#00ff44';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 12, 10);

  // Hi-Score - center
  ctx.textAlign = 'center';
  ctx.fillText('HI: ' + hiScore, W / 2, 10);

  // Lives - right
  ctx.textAlign = 'right';
  let livesStr = '';
  for (let i = 0; i < lives; i++) livesStr += '❤ ';
  ctx.fillStyle = '#ff4444';
  ctx.fillText(livesStr, W - 12, 10);

  // Wave - bottom left
  ctx.fillStyle = '#00ff44';
  ctx.font = '13px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'bottom';
  ctx.fillText('WAVE ' + wave, 12, H - 10);

  // Active power-up timers - bottom right
  ctx.textAlign = 'right';
  ctx.font = '11px monospace';
  let ty = H - 10;
  if (player.shield > 0) {
    ctx.fillStyle = '#4488ff';
    ctx.fillText('SHIELD ' + player.shield.toFixed(1) + 's', W - 12, ty);
    ty -= 14;
  }
  if (player.spreadShot > 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.fillText('SPREAD ' + player.spreadShot.toFixed(1) + 's', W - 12, ty);
    ty -= 14;
  }
  if (player.speedBoost > 0) {
    ctx.fillStyle = '#00ff44';
    ctx.fillText('SPEED ' + player.speedBoost.toFixed(1) + 's', W - 12, ty);
  }

  // Combo display
  if (comboDisplayTimer > 0 && combo >= 2) {
    const mult = Math.min(combo, 16);
    const alpha = Math.min(1, comboDisplayTimer);
    const scale = 1 + (1 - alpha) * 0.3;
    ctx.save();
    ctx.translate(W / 2, H / 2 - 60);
    ctx.scale(scale, scale);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 38px monospace';
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#ffff00';
    ctx.fillStyle = 'rgba(255,255,0,' + alpha.toFixed(2) + ')';
    ctx.fillText('x' + mult + ' COMBO!', 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawStartScreen() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  drawNebula();
  drawStars();

  // Title
  ctx.shadowBlur = 40;
  ctx.shadowColor = '#00ffff';
  ctx.fillStyle = '#00ffff';
  ctx.font = 'bold 52px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('GALAXY', W / 2, H / 2 - 80);
  ctx.shadowColor = '#ff00ff';
  ctx.fillStyle = '#ff00ff';
  ctx.fillText('SHOOTER', W / 2, H / 2 - 25);

  // Blink
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#00ff88';
  ctx.fillStyle = '#00ff88';
  ctx.font = '18px monospace';
  if (Math.floor(performance.now() / 600) % 2 === 0) {
    ctx.fillText('PRESS SPACE TO START', W / 2, H / 2 + 50);
  }

  // Controls
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#666';
  ctx.font = '13px monospace';
  ctx.fillText('ARROWS / A D = Move | SPACE = Shoot | P = Pause', W / 2, H / 2 + 120);
  ctx.fillText('Destroy enemies, collect power-ups, defeat bosses!', W / 2, H / 2 + 145);

  // Decorative ships
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#ff4444';
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.moveTo(W / 2 - 100, H / 2 + 180);
  ctx.lineTo(W / 2 - 108, H / 2 + 192);
  ctx.lineTo(W / 2 - 92, H / 2 + 192);
  ctx.closePath();
  ctx.fill();

  ctx.shadowColor = '#ffcc00';
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI / 4) * i - Math.PI / 8;
    const px = W / 2 + Math.cos(angle) * 12;
    const py = H / 2 + 186 + Math.sin(angle) * 12;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();

  ctx.shadowColor = '#ff8800';
  ctx.fillStyle = '#ff8800';
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 3) * i - Math.PI / 2;
    const px = W / 2 + 100 + Math.cos(angle) * 10;
    const py = H / 2 + 186 + Math.sin(angle) * 10;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawPauseScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  ctx.shadowBlur = 25;
  ctx.shadowColor = '#00ffff';
  ctx.fillStyle = '#00ffff';
  ctx.font = 'bold 44px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('PAUSED', W / 2, H / 2);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#888';
  ctx.font = '16px monospace';
  ctx.fillText('P to resume', W / 2, H / 2 + 45);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, W, H);
  ctx.shadowBlur = 25;
  ctx.shadowColor = '#ff4444';
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 46px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 50);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffffff';
  ctx.font = '22px monospace';
  ctx.fillText('SCORE: ' + score, W / 2, H / 2 + 5);
  ctx.fillStyle = '#ffcc00';
  ctx.fillText('HI-SCORE: ' + hiScore, W / 2, H / 2 + 35);
  ctx.fillStyle = '#00ff88';
  ctx.font = '16px monospace';
  if (Math.floor(performance.now() / 600) % 2 === 0) {
    ctx.fillText('PRESS SPACE TO RESTART', W / 2, H / 2 + 85);
  }
}

function drawLevelUp() {
  const alpha = Math.min(1, levelUpTimer / 0.5);
  ctx.shadowBlur = 30;
  ctx.shadowColor = '#ffff00';
  ctx.fillStyle = 'rgba(255,255,0,' + alpha.toFixed(2) + ')';
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('WAVE ' + wave, W / 2, H / 2);
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,' + (alpha * 0.7).toFixed(2) + ')';
  ctx.font = '18px monospace';
  ctx.fillText('GET READY!', W / 2, H / 2 + 40);
}

// ============================
// MAIN LOOP
// ============================
let lastTime = performance.now();

function gameLoop(timestamp) {
  let dt = (timestamp - lastTime) / 1000;
  if (dt > 0.05) dt = 0.05; // Cap delta time
  if (dt < 0) dt = 0;
  lastTime = timestamp;

  update(dt);

  // Clear
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  if (gameState === STATE.START) {
    drawStartScreen();
    requestAnimationFrame(gameLoop);
    return;
  }

  // Apply screen shake
  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawNebula();
  drawStars();
  drawParticles();
  drawPowerups();
  drawEnemyBullets();
  for (let i = 0; i < enemies.length; i++) {
    drawEnemy(enemies[i]);
  }
  drawBoss();
  drawBullets();
  if (gameState !== STATE.GAMEOVER) {
    drawPlayer();
  }

  ctx.restore();

  // Flash overlay
  if (flashAlpha > 0) {
    ctx.fillStyle = 'rgba(255,255,255,' + flashAlpha.toFixed(2) + ')';
    ctx.fillRect(0, 0, W, H);
  }

  drawHUD();

  if (gameState === STATE.PAUSED) drawPauseScreen();
  if (gameState === STATE.GAMEOVER) drawGameOver();
  if (gameState === STATE.LEVELUP) drawLevelUp();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

})();
</script>
</body>
