<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Shooter V2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
canvas { max-width: 100%; height: auto; display: block; margin: 0 auto; }
</style>
</head>
<body>
<canvas id="game" width="600" height="650"></canvas>
<script>
(function() {
'use strict';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 600, H = 650;

// ============================
// AUDIO (Web Audio API)
// ============================
let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type, pitchMult) {
  if (!audioCtx || audioCtx.state !== 'running') return;
  const pm = pitchMult || 1;
  try {
    const now = audioCtx.currentTime;
    switch (type) {
      case 'shoot': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(880 * pm, now);
        osc.frequency.exponentialRampToValueAtTime(1300 * pm, now + 0.05);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now); osc.stop(now + 0.1);
        break;
      }
      case 'enemyDeath': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400 * pm, now);
        osc.frequency.exponentialRampToValueAtTime(150 * pm, now + 0.2);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now); osc.stop(now + 0.2);
        break;
      }
      case 'chainKill': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600 * pm, now);
        osc.frequency.exponentialRampToValueAtTime(250 * pm, now + 0.12);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now); osc.stop(now + 0.12);
        break;
      }
      case 'playerHit': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, now);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now); osc.stop(now + 0.3);
        break;
      }
      case 'bossHit': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(220, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now); osc.stop(now + 0.15);
        break;
      }
      case 'powerup': {
        const notes = [523, 659, 784, 1047];
        notes.forEach(function(freq, i) {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now + i * 0.08);
          gain.gain.setValueAtTime(0, now + i * 0.08);
          gain.gain.linearRampToValueAtTime(0.1, now + i * 0.08 + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.12);
          osc.connect(gain).connect(audioCtx.destination);
          osc.start(now + i * 0.08); osc.stop(now + i * 0.08 + 0.12);
        });
        break;
      }
      case 'warp': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(80, now);
        osc.frequency.exponentialRampToValueAtTime(400, now + 0.8);
        osc.frequency.exponentialRampToValueAtTime(60, now + 1.5);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.linearRampToValueAtTime(0.12, now + 0.5);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now); osc.stop(now + 1.5);
        break;
      }
    }
  } catch (e) { /* ignore audio errors */ }
}

let bgDrone = null;
function startDrone() {
  if (!audioCtx || bgDrone) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(55, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    bgDrone = { osc: osc, gain: gain };
  } catch (e) {}
}
function stopDrone() {
  if (bgDrone) {
    try { bgDrone.osc.stop(); } catch (e) {}
    bgDrone = null;
  }
}

// ============================
// GAME STATE
// ============================
const STATE = { START: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3, WARP: 4 };
let gameState = STATE.START;
let score = 0;
let hiScore = parseInt(localStorage.getItem('galaxyShooterHiScore')) || 0;
let lives = 3;
let wave = 1;

// Warp state
let warpTimer = 0;
const WARP_DURATION = 1.5;
let warpLines = [];

// Wave color themes
const waveThemes = ['#00ffff', '#ff00ff', '#ffcc00'];
let currentThemeColor = '#00ffff';
let targetThemeColor = '#00ffff';
let themeTransitionTimer = 0;

function getWaveTheme(w) {
  if (w % 3 === 0) return '#ff2200'; // boss wave
  return waveThemes[(w - 1) % 3];
}

function lerpColor(a, b, t) {
  const ar = parseInt(a.slice(1, 3), 16), ag = parseInt(a.slice(3, 5), 16), ab = parseInt(a.slice(5, 7), 16);
  const br = parseInt(b.slice(1, 3), 16), bg = parseInt(b.slice(3, 5), 16), bb = parseInt(b.slice(5, 7), 16);
  const rr = Math.round(ar + (br - ar) * t);
  const rg = Math.round(ag + (bg - ag) * t);
  const rb = Math.round(ab + (bb - ab) * t);
  return '#' + ((1 << 24) + (rr << 16) + (rg << 8) + rb).toString(16).slice(1);
}

// ============================
// INPUT
// ============================
const keys = {};
const isTouchDevice = 'ontouchstart' in window;

document.addEventListener('keydown', function(e) {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (e.code === 'KeyP') {
    if (gameState === STATE.PLAYING) { gameState = STATE.PAUSED; return; }
    if (gameState === STATE.PAUSED) { gameState = STATE.PLAYING; return; }
  }
  if (e.code === 'Space') {
    initAudio();
    if (gameState === STATE.START) { startGame(); return; }
    if (gameState === STATE.GAMEOVER) { startGame(); return; }
  }
});
document.addEventListener('keyup', function(e) { keys[e.code] = false; });

// ============================
// MOBILE TOUCH CONTROLS
// ============================
let touchJoystick = { active: false, startX: 0, startY: 0, currentX: 0, currentY: 0, value: 0 };
let touchFire = { active: false };

const joystickPos = { x: 80, y: H - 80 };
const fireButtonPos = { x: W - 80, y: H - 80 };
const joystickOuterR = 60;
const joystickInnerR = 20;
const fireButtonR = 50;

function getCanvasTouchPos(touch) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  return {
    x: (touch.clientX - rect.left) * scaleX,
    y: (touch.clientY - rect.top) * scaleY
  };
}

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  initAudio();
  if (gameState === STATE.START) { startGame(); return; }
  if (gameState === STATE.GAMEOVER) { startGame(); return; }
  for (let i = 0; i < e.changedTouches.length; i++) {
    const pos = getCanvasTouchPos(e.changedTouches[i]);
    const distToJoystick = Math.hypot(pos.x - joystickPos.x, pos.y - joystickPos.y);
    const distToFire = Math.hypot(pos.x - fireButtonPos.x, pos.y - fireButtonPos.y);
    if (distToJoystick < joystickOuterR + 30) {
      touchJoystick.active = true;
      touchJoystick.id = e.changedTouches[i].identifier;
      touchJoystick.currentX = pos.x;
      touchJoystick.currentY = pos.y;
      const dx = pos.x - joystickPos.x;
      touchJoystick.value = Math.max(-1, Math.min(1, dx / joystickOuterR));
    } else if (distToFire < fireButtonR + 30) {
      touchFire.active = true;
      touchFire.id = e.changedTouches[i].identifier;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  for (let i = 0; i < e.changedTouches.length; i++) {
    if (touchJoystick.active && e.changedTouches[i].identifier === touchJoystick.id) {
      const pos = getCanvasTouchPos(e.changedTouches[i]);
      touchJoystick.currentX = pos.x;
      touchJoystick.currentY = pos.y;
      const dx = pos.x - joystickPos.x;
      touchJoystick.value = Math.max(-1, Math.min(1, dx / joystickOuterR));
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  for (let i = 0; i < e.changedTouches.length; i++) {
    if (touchJoystick.active && e.changedTouches[i].identifier === touchJoystick.id) {
      touchJoystick.active = false;
      touchJoystick.value = 0;
    }
    if (touchFire.active && e.changedTouches[i].identifier === touchFire.id) {
      touchFire.active = false;
    }
  }
}, { passive: false });

canvas.addEventListener('touchcancel', function(e) {
  e.preventDefault();
  touchJoystick.active = false;
  touchJoystick.value = 0;
  touchFire.active = false;
}, { passive: false });

// ============================
// BACKGROUND: STARS & NEBULA
// ============================
const stars = [];
for (let i = 0; i < 100; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    size: Math.random() * 2 + 0.5,
    twinkle: Math.random() * Math.PI * 2,
    speed: Math.random() * 30 + 10
  });
}

const nebulae = [];
for (let i = 0; i < 5; i++) {
  const colors = ['#6600aa', '#003388', '#005555', '#440088', '#002266'];
  nebulae.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 140 + 80,
    color: colors[i],
    dx: (Math.random() - 0.5) * 15,
    dy: (Math.random() - 0.5) * 10
  });
}

// ============================
// PLAYER
// ============================
let player = {};

function resetPlayer() {
  player = {
    x: W / 2,
    y: H - 60,
    vx: 0,
    width: 24,
    height: 30,
    invincible: 0,
    spreadShot: 0,
    speedBoost: 0,
    shield: 0
  };
}

// ============================
// GAME OBJECTS
// ============================
let bullets = [];
let lastShotTime = 0;
let enemies = [];
let enemyBullets = [];
let enemyShootTimer = 0;
let boss = null;
let bossHPMax = 0;
let particles = [];
let powerups = [];
let engineTrail = [];
let scorePopups = [];
let shockwaves = [];
let chainTexts = [];

// Combo
let combo = 0;
let comboTimer = 0;
let comboDisplayTimer = 0;

// Screen shake
let shakeX = 0, shakeY = 0, shakeDuration = 0, shakeIntensity = 0;

// Flash
let flashAlpha = 0;

// ============================
// GAME FUNCTIONS
// ============================
function startGame() {
  gameState = STATE.PLAYING;
  score = 0;
  lives = 3;
  wave = 1;
  resetPlayer();
  bullets = [];
  enemies = [];
  enemyBullets = [];
  particles = [];
  powerups = [];
  engineTrail = [];
  scorePopups = [];
  shockwaves = [];
  chainTexts = [];
  boss = null;
  combo = 0;
  comboTimer = 0;
  comboDisplayTimer = 0;
  shakeX = 0; shakeY = 0; shakeDuration = 0; shakeIntensity = 0;
  flashAlpha = 0;
  enemyShootTimer = 0;
  warpTimer = 0;
  warpLines = [];
  currentThemeColor = getWaveTheme(1);
  targetThemeColor = currentThemeColor;
  themeTransitionTimer = 0;
  spawnWave();
  startDrone();
}

function spawnWave() {
  if (wave % 3 === 0) {
    // Boss wave
    const hp = 20 + wave * 5;
    bossHPMax = hp;
    boss = {
      x: W / 2, y: -80, targetY: 70,
      hp: hp, maxHp: hp,
      width: 80, height: 60,
      vx: 1.5, shootTimer: 0, phase: 0,
      entered: false,
      patternTimer: 0,
      currentPattern: 0,
      spiralOffset: 0,
      ringTimer: 0,
      aimedTimer: 0
    };
  } else {
    const count = wave === 1 ? 8 : (wave <= 2 ? 12 : 16);
    const speedMult = 1 + (wave - 1) * 0.12;
    const cols = Math.min(count, 8);
    const rows = Math.ceil(count / cols);
    let spawned = 0;
    for (let r = 0; r < rows && spawned < count; r++) {
      for (let c = 0; c < cols && spawned < count; c++) {
        const typeRoll = Math.random();
        let enemy;
        const baseX = 60 + c * 65;
        const baseY = -40 - r * 55;
        if (typeRoll < 0.4) {
          enemy = { type: 'A', x: baseX, y: baseY, size: 12, color: '#ff4444', hp: 1, points: 10, speed: 80 * speedMult, phase: Math.random() * Math.PI * 2, amplitude: 40 + Math.random() * 20 };
        } else if (typeRoll < 0.75) {
          enemy = { type: 'B', x: baseX, y: baseY, size: 16, color: '#ff8800', hp: 2, points: 20, speed: 55 * speedMult, phase: Math.random() * Math.PI * 2, amplitude: 30 + Math.random() * 20 };
        } else {
          enemy = { type: 'C', x: baseX, y: baseY, size: 22, color: '#ffcc00', hp: 3, points: 30, speed: 35 * speedMult, phase: Math.random() * Math.PI * 2, amplitude: 25 + Math.random() * 15 };
        }
        enemy.baseX = baseX;
        enemy.startY = baseY;
        enemy.time = 0;
        enemies.push(enemy);
        spawned++;
      }
    }
  }
}

function triggerShake(intensity, duration) {
  shakeIntensity = Math.max(shakeIntensity, intensity);
  shakeDuration = Math.max(shakeDuration, duration);
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 200 + 50;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: Math.random() * 2 + 1.5,
      color: color,
      size: Math.random() * 3 + 1
    });
  }
}

function maybeSpawnPowerup(x, y) {
  if (Math.random() > 0.15) return;
  const types = ['shield', 'spread', 'speed'];
  const type = types[Math.floor(Math.random() * types.length)];
  powerups.push({ x: x, y: y, type: type, vy: 80, size: 14, time: 0 });
}

function spawnScorePopup(x, y, points, color) {
  scorePopups.push({
    x: x, y: y,
    text: '+' + points,
    color: color,
    life: 0.8,
    maxLife: 0.8
  });
}

function spawnShockwave(x, y) {
  shockwaves.push({
    x: x, y: y,
    radius: 0,
    maxRadius: 80,
    life: 0.3,
    maxLife: 0.3
  });
}

function spawnChainText(x, y, count) {
  chainTexts.push({
    x: x, y: y,
    text: 'CHAIN x' + count + '!',
    life: 1.0,
    maxLife: 1.0
  });
}

// Chain explosion system
function processChainExplosions(deadEnemyPositions) {
  let totalChain = 0;
  let depth = 0;
  const maxDepth = 4;
  let currentPositions = deadEnemyPositions.slice();

  while (currentPositions.length > 0 && depth < maxDepth) {
    depth++;
    const nextPositions = [];
    for (let p = 0; p < currentPositions.length; p++) {
      const pos = currentPositions[p];
      const toKill = [];
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        if (e._dead) continue;
        const dist = Math.hypot(e.x - pos.x, e.y - pos.y);
        if (dist < 80) {
          e.hp -= 1;
          if (e.hp <= 0) {
            e._dead = true;
            toKill.push(i);
            nextPositions.push({ x: e.x, y: e.y });
            totalChain++;
            const mult = combo >= 2 ? Math.min(combo, 16) : 1;
            const chainScore = 50 * mult;
            score += e.points * mult + chainScore;
            combo++;
            comboTimer = 1.5;
            if (combo >= 2) comboDisplayTimer = 1.5;
            spawnParticles(e.x, e.y, e.color, 8);
            spawnShockwave(e.x, e.y);
            spawnScorePopup(e.x, e.y - 10, e.points + chainScore, e.color);
            maybeSpawnPowerup(e.x, e.y);
            playSound('chainKill', 1 + totalChain * 0.15);
          }
        }
      }
    }
    currentPositions = nextPositions;
  }
  // Clean dead enemies
  enemies = enemies.filter(function(e) { return !e._dead; });
  if (totalChain >= 2) {
    const lastPos = deadEnemyPositions[deadEnemyPositions.length - 1] || { x: W / 2, y: H / 2 };
    spawnChainText(lastPos.x, lastPos.y - 30, totalChain);
  }
}

// Warp transition
function initWarp() {
  gameState = STATE.WARP;
  warpTimer = WARP_DURATION;
  warpLines = [];
  for (let i = 0; i < 70; i++) {
    const angle = Math.random() * Math.PI * 2;
    warpLines.push({
      angle: angle,
      startDist: 10 + Math.random() * 30,
      length: 20 + Math.random() * 60,
      speed: 300 + Math.random() * 400,
      width: 1 + Math.random() * 2,
      brightness: 0.5 + Math.random() * 0.5
    });
  }
  playSound('warp');
}

// Boss bullet patterns
function bossShootSpiralBurst() {
  if (!boss) return;
  const bulletCount = 16;
  for (let i = 0; i < bulletCount; i++) {
    const angle = (Math.PI * 2 / bulletCount) * i + boss.spiralOffset;
    enemyBullets.push({
      x: boss.x,
      y: boss.y + boss.height / 2,
      vx: Math.cos(angle) * 3 * 60,
      vy: Math.sin(angle) * 3 * 60,
      color: '#ff4444',
      radius: 4
    });
  }
  boss.spiralOffset += 15 * Math.PI / 180;
}

function bossShootAimedBarrage() {
  if (!boss) return;
  const angle = Math.atan2(player.y - boss.y, player.x - boss.x);
  const offsets = [0, -10, 10, -20, 20];
  for (let i = 0; i < 5; i++) {
    const a = angle + offsets[i] * Math.PI / 180;
    enemyBullets.push({
      x: boss.x,
      y: boss.y + boss.height / 2,
      vx: Math.cos(a) * 4 * 60,
      vy: Math.sin(a) * 4 * 60,
      color: '#ff8800',
      radius: 4
    });
  }
}

function bossShootRingWaves() {
  if (!boss) return;
  const bulletCount = 12;
  for (let i = 0; i < bulletCount; i++) {
    const angle = (Math.PI * 2 / bulletCount) * i;
    enemyBullets.push({
      x: boss.x,
      y: boss.y + boss.height / 2,
      vx: Math.cos(angle) * 3.5 * 60,
      vy: Math.sin(angle) * 3.5 * 60,
      color: '#ffcc00',
      radius: 4
    });
  }
  // Below 40% HP: fire second offset ring
  if (boss.hp / boss.maxHp < 0.4) {
    for (let i = 0; i < bulletCount; i++) {
      const angle = (Math.PI * 2 / bulletCount) * i + Math.PI / bulletCount;
      enemyBullets.push({
        x: boss.x,
        y: boss.y + boss.height / 2,
        vx: Math.cos(angle) * 3.5 * 60,
        vy: Math.sin(angle) * 3.5 * 60,
        color: '#ffcc00',
        radius: 3
      });
    }
  }
}

// ============================
// UPDATE
// ============================
function update(dt) {
  // Animate nebulae always
  for (let i = 0; i < nebulae.length; i++) {
    const n = nebulae[i];
    n.x += n.dx * dt;
    n.y += n.dy * dt;
    if (n.x < -150 || n.x > W + 150) n.dx *= -1;
    if (n.y < -150 || n.y > H + 150) n.dy *= -1;
  }

  // Animate stars always
  for (let i = 0; i < stars.length; i++) {
    const s = stars[i];
    s.twinkle += dt * 3;
    s.y += s.speed * dt;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  }

  // Update particles always
  particles = particles.filter(function(p) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 100 * dt;
    p.life -= p.decay * dt;
    return p.life > 0;
  });

  // Update engine trail always
  engineTrail = engineTrail.filter(function(p) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    p.size = p.maxSize * (p.life / p.maxLife);
    return p.life > 0;
  });

  // Update score popups always
  scorePopups = scorePopups.filter(function(p) {
    p.life -= dt;
    p.y -= 50 * dt;
    return p.life > 0;
  });

  // Update shockwaves
  shockwaves = shockwaves.filter(function(s) {
    s.life -= dt;
    s.radius = s.maxRadius * (1 - s.life / s.maxLife);
    return s.life > 0;
  });

  // Update chain texts
  chainTexts = chainTexts.filter(function(c) {
    c.life -= dt;
    c.y -= 30 * dt;
    return c.life > 0;
  });

  // Theme color transition
  if (themeTransitionTimer > 0) {
    themeTransitionTimer -= dt;
    if (themeTransitionTimer < 0) themeTransitionTimer = 0;
    const t = 1 - themeTransitionTimer;
    currentThemeColor = lerpColor(currentThemeColor, targetThemeColor, Math.min(1, dt * 2));
  }

  // WARP STATE
  if (gameState === STATE.WARP) {
    warpTimer -= dt;
    // Update warp lines
    for (let i = 0; i < warpLines.length; i++) {
      const line = warpLines[i];
      line.startDist += line.speed * dt;
      line.length += line.speed * 0.5 * dt;
    }
    if (warpTimer <= 0) {
      gameState = STATE.PLAYING;
      spawnWave();
    }
    return;
  }

  if (gameState !== STATE.PLAYING) return;

  // Screen shake
  if (shakeDuration > 0) {
    shakeDuration -= dt * 1000;
    shakeX = (Math.random() - 0.5) * shakeIntensity * 2;
    shakeY = (Math.random() - 0.5) * shakeIntensity * 2;
    if (shakeDuration <= 0) {
      shakeX = 0; shakeY = 0; shakeIntensity = 0;
    }
  }

  // Flash
  if (flashAlpha > 0) flashAlpha -= dt * 3;
  if (flashAlpha < 0) flashAlpha = 0;

  // Player movement
  const maxSpeed = player.speedBoost > 0 ? 450 : 300;
  const accel = 1800;
  const friction = 10;

  let moveInput = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) moveInput = -1;
  else if (keys['ArrowRight'] || keys['KeyD']) moveInput = 1;

  // Touch joystick input
  if (isTouchDevice && touchJoystick.active) {
    moveInput = touchJoystick.value;
  }

  if (moveInput !== 0) {
    player.vx += moveInput * accel * dt;
  } else {
    if (Math.abs(player.vx) < 20) {
      player.vx = 0;
    } else {
      player.vx *= Math.max(0, 1 - friction * dt);
    }
  }

  if (player.vx > maxSpeed) player.vx = maxSpeed;
  if (player.vx < -maxSpeed) player.vx = -maxSpeed;

  player.x += player.vx * dt;
  if (player.x < player.width) { player.x = player.width; player.vx = 0; }
  if (player.x > W - player.width) { player.x = W - player.width; player.vx = 0; }

  // Engine trail particles
  if (gameState === STATE.PLAYING) {
    for (let i = 0; i < 2; i++) {
      engineTrail.push({
        x: player.x + (Math.random() - 0.5) * 6,
        y: player.y + player.height / 3,
        vx: (Math.random() - 0.5) * 20,
        vy: 30 + Math.random() * 20,
        life: 0.3,
        maxLife: 0.3,
        size: 3,
        maxSize: 3,
        color: Math.random() > 0.5 ? '#00ffff' : '#4488ff'
      });
    }
  }

  // Timers
  if (player.invincible > 0) player.invincible -= dt;
  if (player.spreadShot > 0) player.spreadShot -= dt;
  if (player.speedBoost > 0) player.speedBoost -= dt;
  if (player.shield > 0) player.shield -= dt;

  // Shooting
  const wantShoot = keys['Space'] || (isTouchDevice && touchFire.active);
  const maxBullets = player.spreadShot > 0 ? 9 : 2;
  const now = performance.now();
  if (wantShoot && bullets.length < maxBullets && (now - lastShotTime > 300)) {
    lastShotTime = now;
    if (player.spreadShot > 0) {
      bullets.push({ x: player.x - 8, y: player.y - 20, vx: -100, vy: -500 });
      bullets.push({ x: player.x, y: player.y - 22, vx: 0, vy: -520 });
      bullets.push({ x: player.x + 8, y: player.y - 20, vx: 100, vy: -500 });
    } else {
      bullets.push({ x: player.x, y: player.y - 20, vx: 0, vy: -520 });
    }
    playSound('shoot');
  }

  // Update bullets
  bullets = bullets.filter(function(b) {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    return b.y > -20 && b.x > -20 && b.x < W + 20;
  });

  // Update enemies
  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    e.time += dt;
    e.y = e.startY + e.speed * e.time;
    e.phase += dt * 2;
    e.x = e.baseX + Math.sin(e.phase) * e.amplitude;
  }
  enemies = enemies.filter(function(e) { return e.y < H + 50; });

  // Enemy shooting
  enemyShootTimer += dt;
  if (enemyShootTimer > 2) {
    enemyShootTimer = 0;
    const bottomEnemies = enemies.filter(function(e) { return e.y > 80; });
    if (bottomEnemies.length > 0) {
      const shooter = bottomEnemies[Math.floor(Math.random() * bottomEnemies.length)];
      const angle = Math.atan2(player.y - shooter.y, player.x - shooter.x);
      enemyBullets.push({
        x: shooter.x,
        y: shooter.y + shooter.size,
        vx: Math.cos(angle) * 200,
        vy: Math.sin(angle) * 200,
        color: '#ff4444',
        radius: 4
      });
    }
  }

  // Update enemy bullets
  enemyBullets = enemyBullets.filter(function(b) {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    return b.y < H + 20 && b.y > -20 && b.x > -20 && b.x < W + 20;
  });

  // Boss update
  if (boss) {
    if (!boss.entered) {
      boss.y += 80 * dt;
      if (boss.y >= boss.targetY) {
        boss.y = boss.targetY;
        boss.entered = true;
      }
    } else {
      // Determine boss phase based on HP percentage
      const hpPct = boss.hp / boss.maxHp;
      let speedFactor;
      let patterns;
      if (hpPct > 0.6) {
        speedFactor = 1;
        patterns = [0]; // Pattern A only
      } else if (hpPct > 0.3) {
        speedFactor = 1.8;
        patterns = [0, 1]; // A and B alternating
      } else {
        speedFactor = 2.8;
        patterns = [0, 1, 2]; // All three
      }

      boss.x += boss.vx * speedFactor * 100 * dt;
      if (boss.x < 80) { boss.x = 80; boss.vx = Math.abs(boss.vx); }
      if (boss.x > W - 80) { boss.x = W - 80; boss.vx = -Math.abs(boss.vx); }

      // Pattern rotation every 4 seconds
      boss.patternTimer += dt;
      if (boss.patternTimer >= 4) {
        boss.patternTimer = 0;
        boss.currentPattern = (boss.currentPattern + 1) % patterns.length;
      }

      const activePattern = patterns[boss.currentPattern % patterns.length];

      // Shoot based on active pattern
      boss.shootTimer += dt;
      if (activePattern === 0) {
        // Spiral Burst: every 0.8s
        if (boss.shootTimer >= 0.8) {
          boss.shootTimer = 0;
          bossShootSpiralBurst();
        }
      } else if (activePattern === 1) {
        // Aimed Barrage: every 0.6s
        if (boss.shootTimer >= 0.6) {
          boss.shootTimer = 0;
          bossShootAimedBarrage();
        }
      } else if (activePattern === 2) {
        // Ring Waves: every 1.2s
        if (boss.shootTimer >= 1.2) {
          boss.shootTimer = 0;
          bossShootRingWaves();
        }
      }
    }
    boss.phase = (boss.phase || 0) + dt * 3;
  }

  // Bullet vs Enemy collision
  const bulletsToRemove = {};
  const deadPositions = [];

  for (let bi = 0; bi < bullets.length; bi++) {
    const b = bullets[bi];
    if (bulletsToRemove[bi]) continue;

    for (let ei = 0; ei < enemies.length; ei++) {
      const e = enemies[ei];
      if (e._dead) continue;
      if (Math.abs(b.x - e.x) < e.size + 4 && Math.abs(b.y - e.y) < e.size + 4) {
        bulletsToRemove[bi] = true;
        e.hp--;
        if (e.hp <= 0) {
          e._dead = true;
          const mult = combo >= 2 ? Math.min(combo, 16) : 1;
          const pts = e.points * mult;
          score += pts;
          combo++;
          comboTimer = 1.5;
          if (combo >= 2) comboDisplayTimer = 1.5;
          spawnParticles(e.x, e.y, e.color, 12);
          spawnShockwave(e.x, e.y);
          spawnScorePopup(e.x, e.y - 10, pts, e.color);
          maybeSpawnPowerup(e.x, e.y);
          triggerShake(2, 80);
          playSound('enemyDeath');
          deadPositions.push({ x: e.x, y: e.y });
        }
        break;
      }
    }

    // Bullet vs Boss
    if (!bulletsToRemove[bi] && boss && boss.entered) {
      if (Math.abs(b.x - boss.x) < boss.width / 2 + 4 && Math.abs(b.y - boss.y) < boss.height / 2 + 4) {
        bulletsToRemove[bi] = true;
        boss.hp--;
        triggerShake(5, 150);
        playSound('bossHit');
        spawnParticles(b.x, b.y, '#ff00ff', 6);
        if (boss.hp <= 0) {
          const mult = combo >= 2 ? Math.min(combo, 16) : 1;
          const pts = 500 * mult;
          score += pts;
          combo++;
          comboTimer = 1.5;
          if (combo >= 2) comboDisplayTimer = 1.5;
          spawnParticles(boss.x, boss.y, '#ff00ff', 50);
          spawnParticles(boss.x, boss.y, '#ffff00', 30);
          spawnParticles(boss.x, boss.y, '#ffffff', 20);
          spawnScorePopup(boss.x, boss.y - 20, pts, '#ff00ff');
          flashAlpha = 1;
          triggerShake(15, 500);
          playSound('enemyDeath');
          boss = null;
        }
      }
    }
  }

  bullets = bullets.filter(function(_, i) { return !bulletsToRemove[i]; });
  // Remove directly killed enemies
  enemies = enemies.filter(function(e) { return !e._dead; });

  // Process chain explosions from initial kills
  if (deadPositions.length > 0) {
    processChainExplosions(deadPositions);
  }

  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { combo = 0; }
  }
  if (comboDisplayTimer > 0) comboDisplayTimer -= dt;

  // Player collision with enemies and enemy bullets
  const isProtected = player.invincible > 0 || player.shield > 0;
  if (!isProtected) {
    let hit = false;
    for (let i = 0; i < enemies.length; i++) {
      const e = enemies[i];
      if (Math.abs(e.x - player.x) < e.size + 10 && Math.abs(e.y - player.y) < e.size + 14) {
        hit = true; break;
      }
    }
    if (!hit) {
      for (let i = 0; i < enemyBullets.length; i++) {
        const b = enemyBullets[i];
        if (Math.abs(b.x - player.x) < 14 && Math.abs(b.y - player.y) < 18) {
          hit = true; break;
        }
      }
    }
    if (hit) {
      lives--;
      player.invincible = 2;
      triggerShake(15, 500);
      playSound('playerHit');
      spawnParticles(player.x, player.y, '#00ffff', 20);
      enemyBullets = [];
      if (lives <= 0) {
        gameState = STATE.GAMEOVER;
        stopDrone();
        if (score > hiScore) {
          hiScore = score;
          localStorage.setItem('galaxyShooterHiScore', String(hiScore));
        }
      }
    }
  } else if (player.shield > 0 && player.invincible <= 0) {
    // Shield absorbs hits
    let hitByBullet = false;
    for (let i = 0; i < enemyBullets.length; i++) {
      const b = enemyBullets[i];
      if (Math.abs(b.x - player.x) < 20 && Math.abs(b.y - player.y) < 24) {
        hitByBullet = true;
        enemyBullets.splice(i, 1);
        i--;
        spawnParticles(player.x, player.y, '#4488ff', 5);
      }
    }
  }

  // Power-up collection and movement
  powerups = powerups.filter(function(p) {
    p.y += p.vy * dt;
    p.time += dt;
    if (p.y > H + 20) return false;
    if (Math.abs(p.x - player.x) < 22 && Math.abs(p.y - player.y) < 22) {
      playSound('powerup');
      if (p.type === 'shield') player.shield = 5;
      else if (p.type === 'spread') player.spreadShot = 8;
      else if (p.type === 'speed') player.speedBoost = 6;
      return false;
    }
    return true;
  });

  // Check wave clear
  if (enemies.length === 0 && !boss) {
    wave++;
    if (score > hiScore) {
      hiScore = score;
      localStorage.setItem('galaxyShooterHiScore', String(hiScore));
    }
    targetThemeColor = getWaveTheme(wave);
    themeTransitionTimer = 1.0;
    initWarp();
  }
}

// ============================
// DRAWING
// ============================
function drawNebula() {
  for (let i = 0; i < nebulae.length; i++) {
    const n = nebulae[i];
    const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    grad.addColorStop(0, n.color + '44');
    grad.addColorStop(0.5, n.color + '22');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawStars() {
  for (let i = 0; i < stars.length; i++) {
    const s = stars[i];
    const alpha = 0.3 + Math.sin(s.twinkle) * 0.4 + 0.3;
    ctx.fillStyle = 'rgba(255,255,255,' + alpha.toFixed(2) + ')';
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
}

function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible * 8) % 2 === 0) return;

  ctx.save();
  ctx.translate(player.x, player.y);

  // Hexagonal shield visual
  if (player.shield > 0) {
    const shieldVisible = player.shield >= 2 || Math.floor(player.shield * 8) % 2 === 0;
    if (shieldVisible) {
      ctx.save();
      const rotation = performance.now() * 0.001; // 1 rad/s
      ctx.rotate(rotation);
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#4488ff';
      ctx.strokeStyle = '#4488ff';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i;
        const px = Math.cos(angle) * 35;
        const py = Math.sin(angle) * 35;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  // Ship body
  ctx.shadowBlur = 15;
  ctx.shadowColor = currentThemeColor;
  ctx.fillStyle = currentThemeColor;
  ctx.beginPath();
  ctx.moveTo(0, -player.height / 2);
  ctx.lineTo(-player.width / 2 - 4, player.height / 2);
  ctx.lineTo(-player.width / 4, player.height / 3);
  ctx.lineTo(0, player.height / 2.5);
  ctx.lineTo(player.width / 4, player.height / 3);
  ctx.lineTo(player.width / 2 + 4, player.height / 2);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = '#003344';
  ctx.beginPath();
  ctx.moveTo(0, -player.height / 4);
  ctx.lineTo(-5, player.height / 6);
  ctx.lineTo(5, player.height / 6);
  ctx.closePath();
  ctx.fill();

  // Engine glow
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#00ff88';
  ctx.fillStyle = '#00ff88';
  const flicker = Math.random() * 6;
  ctx.beginPath();
  ctx.moveTo(-6, player.height / 3);
  ctx.lineTo(-2, player.height / 2 + 5 + flicker);
  ctx.lineTo(2, player.height / 2 + 5 + flicker);
  ctx.lineTo(6, player.height / 3);
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawEngineTrail() {
  for (let i = 0; i < engineTrail.length; i++) {
    const p = engineTrail[i];
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha * 0.7;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawBullets() {
  ctx.shadowBlur = 10;
  ctx.shadowColor = currentThemeColor;
  for (let i = 0; i < bullets.length; i++) {
    const b = bullets[i];
    ctx.fillStyle = currentThemeColor;
    ctx.fillRect(b.x - 2, b.y, 4, 12);
    ctx.globalAlpha = 0.6;
    ctx.fillRect(b.x - 2, b.y + 12, 4, 8);
    ctx.globalAlpha = 0.3;
    ctx.fillRect(b.x - 1.5, b.y + 20, 3, 6);
    ctx.globalAlpha = 1;
  }
  ctx.shadowBlur = 0;
}

function drawEnemyBullets() {
  for (let i = 0; i < enemyBullets.length; i++) {
    const b = enemyBullets[i];
    const color = b.color || '#ff4444';
    const radius = b.radius || 4;
    ctx.shadowBlur = 8;
    ctx.shadowColor = color;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.arc(b.x, b.y, radius + 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  ctx.shadowBlur = 0;
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.shadowBlur = 12;
  ctx.shadowColor = e.color;
  ctx.fillStyle = e.color;
  ctx.strokeStyle = e.color;
  ctx.lineWidth = 2;

  if (e.type === 'A') {
    ctx.beginPath();
    ctx.moveTo(0, -e.size);
    ctx.lineTo(e.size * 0.7, 0);
    ctx.lineTo(0, e.size);
    ctx.lineTo(-e.size * 0.7, 0);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#220000';
    ctx.beginPath();
    ctx.moveTo(0, -e.size * 0.4);
    ctx.lineTo(e.size * 0.25, 0);
    ctx.lineTo(0, e.size * 0.4);
    ctx.lineTo(-e.size * 0.25, 0);
    ctx.closePath();
    ctx.fill();
  } else if (e.type === 'B') {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = (Math.PI / 3) * i - Math.PI / 2;
      const px = Math.cos(angle) * e.size;
      const py = Math.sin(angle) * e.size;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#331100';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, e.size * 0.5, 0, Math.PI * 2);
    ctx.stroke();
  } else {
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI / 4) * i - Math.PI / 8;
      const px = Math.cos(angle) * e.size;
      const py = Math.sin(angle) * e.size;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#443300';
    ctx.beginPath();
    ctx.arc(0, 0, e.size * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(0, 0, e.size * 0.2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawBoss() {
  if (!boss) return;
  ctx.save();
  ctx.translate(boss.x, boss.y);

  const hpPct = boss.hp / boss.maxHp;
  const pulse = Math.sin(boss.phase || 0) * 8 + 20;

  // Red glow intensifies below 30%
  if (hpPct < 0.3) {
    ctx.shadowBlur = pulse + 20;
    ctx.shadowColor = '#ff0000';
  } else {
    ctx.shadowBlur = pulse;
    ctx.shadowColor = '#ff00ff';
  }

  // Main body
  ctx.fillStyle = hpPct < 0.3 ? '#ff2200' : '#ff00ff';
  ctx.beginPath();
  ctx.moveTo(0, -boss.height / 2);
  ctx.lineTo(boss.width * 0.3, -boss.height * 0.35);
  ctx.lineTo(boss.width / 2, -boss.height * 0.1);
  ctx.lineTo(boss.width / 2 + 18, 0);
  ctx.lineTo(boss.width / 2, boss.height * 0.2);
  ctx.lineTo(boss.width * 0.35, boss.height * 0.4);
  ctx.lineTo(boss.width * 0.15, boss.height / 2);
  ctx.lineTo(-boss.width * 0.15, boss.height / 2);
  ctx.lineTo(-boss.width * 0.35, boss.height * 0.4);
  ctx.lineTo(-boss.width / 2, boss.height * 0.2);
  ctx.lineTo(-boss.width / 2 - 18, 0);
  ctx.lineTo(-boss.width / 2, -boss.height * 0.1);
  ctx.lineTo(-boss.width * 0.3, -boss.height * 0.35);
  ctx.closePath();
  ctx.fill();

  // Wings
  ctx.fillStyle = hpPct < 0.3 ? '#cc0000' : '#cc00cc';
  ctx.beginPath();
  ctx.moveTo(-boss.width / 2 - 18, 0);
  ctx.lineTo(-boss.width / 2 - 5, -15);
  ctx.lineTo(-boss.width / 2 - 5, 15);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(boss.width / 2 + 18, 0);
  ctx.lineTo(boss.width / 2 + 5, -15);
  ctx.lineTo(boss.width / 2 + 5, 15);
  ctx.closePath();
  ctx.fill();

  // Core
  ctx.shadowBlur = 15;
  ctx.shadowColor = '#ffffff';
  ctx.fillStyle = '#ff88ff';
  ctx.beginPath();
  ctx.arc(0, 0, 14, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(0, 0, 6, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();

  // Health bar at top
  const barW = 240;
  const barH = 18;
  const barX = (W - barW) / 2;
  const barY = 12;
  ctx.fillStyle = '#222';
  ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
  ctx.fillStyle = '#440000';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = '#ff0044';
  ctx.shadowBlur = 6;
  ctx.shadowColor = '#ff0044';
  ctx.fillRect(barX, barY, barW * hpPct, barH);
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#ff00ff';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX - 1, barY - 1, barW + 2, barH + 2);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('BOSS HP: ' + boss.hp + ' / ' + boss.maxHp, W / 2, barY + barH / 2);
}

function drawParticles() {
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.shadowBlur = 4;
    ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawShockwaves() {
  for (let i = 0; i < shockwaves.length; i++) {
    const s = shockwaves[i];
    const alpha = s.life / s.maxLife;
    ctx.globalAlpha = alpha * 0.7;
    ctx.strokeStyle = '#00ffff';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#00ffff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

function drawScorePopups() {
  for (let i = 0; i < scorePopups.length; i++) {
    const p = scorePopups[i];
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

function drawChainTexts() {
  for (let i = 0; i < chainTexts.length; i++) {
    const c = chainTexts[i];
    const alpha = c.life / c.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffffff';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#00ffff';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(c.text, c.x, c.y);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

function drawPowerups() {
  for (let i = 0; i < powerups.length; i++) {
    const p = powerups[i];
    ctx.save();
    ctx.translate(p.x, p.y);
    let color, letter;
    if (p.type === 'shield') { color = '#4488ff'; letter = 'S'; }
    else if (p.type === 'spread') { color = '#ffcc00'; letter = 'W'; }
    else { color = '#00ff44'; letter = 'V'; }

    const pulse = Math.sin(p.time * 5) * 0.3 + 0.7;
    ctx.shadowBlur = 18 * pulse;
    ctx.shadowColor = color;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(0, 0, p.size, 0, Math.PI * 2);
    ctx.stroke();

    ctx.globalAlpha = 0.2;
    ctx.fillStyle = color;
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.shadowBlur = 8;
    ctx.fillStyle = color;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(letter, 0, 1);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawHUD() {
  ctx.shadowBlur = 0;
  ctx.font = 'bold 16px monospace';
  ctx.textBaseline = 'top';

  // Score - left
  ctx.fillStyle = currentThemeColor;
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 12, 10);

  // Hi-Score - center
  ctx.textAlign = 'center';
  ctx.fillText('HI: ' + hiScore, W / 2, 10);

  // Lives - right
  ctx.textAlign = 'right';
  let livesStr = '';
  for (let i = 0; i < lives; i++) livesStr += '❤ ';
  ctx.fillStyle = '#ff4444';
  ctx.fillText(livesStr, W - 12, 10);

  // Wave - bottom left
  ctx.fillStyle = currentThemeColor;
  ctx.font = '13px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'bottom';
  ctx.fillText('WAVE ' + wave, 12, H - 10);

  // Active power-up timers - bottom right
  ctx.textAlign = 'right';
  ctx.font = '11px monospace';
  let ty = H - 10;
  if (player.shield > 0) {
    ctx.fillStyle = '#4488ff';
    ctx.fillText('SHIELD ' + player.shield.toFixed(1) + 's', W - 12, ty);
    ty -= 14;
  }
  if (player.spreadShot > 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.fillText('SPREAD ' + player.spreadShot.toFixed(1) + 's', W - 12, ty);
    ty -= 14;
  }
  if (player.speedBoost > 0) {
    ctx.fillStyle = '#00ff44';
    ctx.fillText('SPEED ' + player.speedBoost.toFixed(1) + 's', W - 12, ty);
  }

  // Combo display
  if (comboDisplayTimer > 0 && combo >= 2) {
    const mult = Math.min(combo, 16);
    const alpha = Math.min(1, comboDisplayTimer);
    const scale = 1 + (1 - alpha) * 0.3;
    ctx.save();
    ctx.translate(W / 2, H / 2 - 60);
    ctx.scale(scale, scale);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 38px monospace';
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#ffff00';
    ctx.fillStyle = 'rgba(255,255,0,' + alpha.toFixed(2) + ')';
    ctx.fillText('x' + mult + ' COMBO!', 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawWarp() {
  const elapsed = WARP_DURATION - warpTimer;
  const progress = elapsed / WARP_DURATION;

  // Darken background
  let darken;
  if (progress < 0.53) {
    darken = Math.min(0.85, progress * 1.6);
  } else {
    darken = 0.85 * (1 - (progress - 0.53) / 0.47);
  }
  ctx.fillStyle = 'rgba(0,0,0,' + darken.toFixed(2) + ')';
  ctx.fillRect(0, 0, W, H);

  // Speed lines
  let lineBrightness;
  if (progress < 0.53) {
    lineBrightness = Math.min(1, progress / 0.4);
  } else {
    lineBrightness = Math.max(0, 1 - (progress - 0.53) / 0.47);
  }

  ctx.save();
  ctx.translate(W / 2, H / 2);
  for (let i = 0; i < warpLines.length; i++) {
    const line = warpLines[i];
    const alpha = lineBrightness * line.brightness;
    if (alpha <= 0) continue;

    const x1 = Math.cos(line.angle) * line.startDist;
    const y1 = Math.sin(line.angle) * line.startDist;
    const x2 = Math.cos(line.angle) * (line.startDist + line.length);
    const y2 = Math.sin(line.angle) * (line.startDist + line.length);

    ctx.strokeStyle = 'rgba(200,255,255,' + alpha.toFixed(2) + ')';
    ctx.lineWidth = line.width;
    ctx.shadowBlur = 5;
    ctx.shadowColor = '#00ffff';
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }
  ctx.restore();
  ctx.shadowBlur = 0;

  // Wave text with zoom effect
  const textProgress = progress;
  let textScale;
  if (textProgress < 0.4) {
    textScale = 0.1 + (textProgress / 0.4) * 1.4; // 0.1 -> 1.5
  } else if (textProgress < 0.7) {
    textScale = 1.5 - ((textProgress - 0.4) / 0.3) * 0.5; // 1.5 -> 1.0
  } else {
    textScale = 1.0;
  }
  const textAlpha = textProgress < 0.1 ? textProgress / 0.1 : (textProgress > 0.85 ? (1 - textProgress) / 0.15 : 1);

  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(textScale, textScale);
  ctx.globalAlpha = Math.max(0, textAlpha);
  ctx.shadowBlur = 30;
  ctx.shadowColor = '#ffffff';
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 52px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('WAVE ' + wave, 0, 0);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawTouchControls() {
  if (!isTouchDevice) return;

  // Joystick - outer circle
  ctx.globalAlpha = 0.4;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(joystickPos.x, joystickPos.y, joystickOuterR, 0, Math.PI * 2);
  ctx.stroke();

  // Joystick - inner dot
  const innerX = joystickPos.x + touchJoystick.value * joystickOuterR;
  const innerY = joystickPos.y;
  ctx.globalAlpha = 0.7;
  ctx.fillStyle = '#00ffff';
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#00ffff';
  ctx.beginPath();
  ctx.arc(innerX, innerY, joystickInnerR, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Fire button
  ctx.globalAlpha = touchFire.active ? 0.8 : 0.5;
  ctx.fillStyle = touchFire.active ? '#ff4444' : '#cc2222';
  ctx.shadowBlur = touchFire.active ? 20 : 10;
  ctx.shadowColor = '#ff0000';
  ctx.beginPath();
  ctx.arc(fireButtonPos.x, fireButtonPos.y, fireButtonR, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Fire button border
  ctx.strokeStyle = '#ff6666';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(fireButtonPos.x, fireButtonPos.y, fireButtonR, 0, Math.PI * 2);
  ctx.stroke();

  // Fire text
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('FIRE', fireButtonPos.x, fireButtonPos.y);

  ctx.globalAlpha = 1;
}

function drawStartScreen() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  drawNebula();
  drawStars();

  // Title
  ctx.shadowBlur = 40;
  ctx.shadowColor = '#00ffff';
  ctx.fillStyle = '#00ffff';
  ctx.font = 'bold 52px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('GALAXY', W / 2, H / 2 - 80);
  ctx.shadowColor = '#ff00ff';
  ctx.fillStyle = '#ff00ff';
  ctx.fillText('SHOOTER', W / 2, H / 2 - 25);

  // Version
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('V2', W / 2 + 130, H / 2 - 25);

  // Blink
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#00ff88';
  ctx.fillStyle = '#00ff88';
  ctx.font = '18px monospace';
  if (Math.floor(performance.now() / 600) % 2 === 0) {
    const startText = isTouchDevice ? 'TAP TO START' : 'PRESS SPACE TO START';
    ctx.fillText(startText, W / 2, H / 2 + 50);
  }

  // Controls
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#666';
  ctx.font = '13px monospace';
  if (isTouchDevice) {
    ctx.fillText('LEFT: Joystick | RIGHT: Fire Button', W / 2, H / 2 + 120);
  } else {
    ctx.fillText('ARROWS / A D = Move | SPACE = Shoot | P = Pause', W / 2, H / 2 + 120);
  }
  ctx.fillText('Chain explosions! Boss bullet-hell! Hyperspace warp!', W / 2, H / 2 + 145);

  // Decorative ships
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#ff4444';
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.moveTo(W / 2 - 100, H / 2 + 180);
  ctx.lineTo(W / 2 - 108, H / 2 + 192);
  ctx.lineTo(W / 2 - 92, H / 2 + 192);
  ctx.closePath();
  ctx.fill();

  ctx.shadowColor = '#ffcc00';
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI / 4) * i - Math.PI / 8;
    const px = W / 2 + Math.cos(angle) * 12;
    const py = H / 2 + 186 + Math.sin(angle) * 12;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();

  ctx.shadowColor = '#ff8800';
  ctx.fillStyle = '#ff8800';
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 3) * i - Math.PI / 2;
    const px = W / 2 + 100 + Math.cos(angle) * 10;
    const py = H / 2 + 186 + Math.sin(angle) * 10;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawPauseScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  ctx.shadowBlur = 25;
  ctx.shadowColor = '#00ffff';
  ctx.fillStyle = '#00ffff';
  ctx.font = 'bold 44px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('PAUSED', W / 2, H / 2);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#888';
  ctx.font = '16px monospace';
  ctx.fillText('P to resume', W / 2, H / 2 + 45);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, W, H);
  ctx.shadowBlur = 25;
  ctx.shadowColor = '#ff4444';
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 46px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 50);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffffff';
  ctx.font = '22px monospace';
  ctx.fillText('SCORE: ' + score, W / 2, H / 2 + 5);
  ctx.fillStyle = '#ffcc00';
  ctx.fillText('HI-SCORE: ' + hiScore, W / 2, H / 2 + 35);
  ctx.fillStyle = '#00ff88';
  ctx.font = '16px monospace';
  if (Math.floor(performance.now() / 600) % 2 === 0) {
    const restartText = isTouchDevice ? 'TAP TO RESTART' : 'PRESS SPACE TO RESTART';
    ctx.fillText(restartText, W / 2, H / 2 + 85);
  }
}

// ============================
// MAIN LOOP
// ============================
let lastTime = performance.now();

function gameLoop(timestamp) {
  let dt = (timestamp - lastTime) / 1000;
  if (dt > 0.05) dt = 0.05;
  if (dt < 0) dt = 0;
  lastTime = timestamp;

  update(dt);

  // Clear
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  if (gameState === STATE.START) {
    drawStartScreen();
    requestAnimationFrame(gameLoop);
    return;
  }

  // Red tint for boss below 30% HP
  let redTint = 0;
  if (boss && boss.entered && boss.hp / boss.maxHp < 0.3) {
    redTint = 0.08 + Math.sin(performance.now() * 0.005) * 0.04;
  }

  // Apply screen shake
  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawNebula();
  drawStars();
  drawEngineTrail();
  drawParticles();
  drawShockwaves();
  drawPowerups();
  drawEnemyBullets();
  for (let i = 0; i < enemies.length; i++) {
    drawEnemy(enemies[i]);
  }
  drawBoss();
  drawBullets();
  drawScorePopups();
  drawChainTexts();
  if (gameState !== STATE.GAMEOVER) {
    drawPlayer();
  }

  ctx.restore();

  // Red tint overlay for enraged boss
  if (redTint > 0) {
    ctx.fillStyle = 'rgba(255,0,0,' + redTint.toFixed(3) + ')';
    ctx.fillRect(0, 0, W, H);
  }

  // Flash overlay
  if (flashAlpha > 0) {
    ctx.fillStyle = 'rgba(255,255,255,' + flashAlpha.toFixed(2) + ')';
    ctx.fillRect(0, 0, W, H);
  }

  // Warp overlay
  if (gameState === STATE.WARP) {
    drawWarp();
  }

  drawHUD();

  if (gameState === STATE.PAUSED) drawPauseScreen();
  if (gameState === STATE.GAMEOVER) drawGameOver();

  // Touch controls drawn last (on top)
  if (gameState === STATE.PLAYING || gameState === STATE.WARP) {
    drawTouchControls();
  }

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

})();
</script>
