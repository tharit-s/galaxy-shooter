const Game = (function () {
  const canvas = document.getElementById('game');
  const ctx    = canvas.getContext('2d');
  const { W, H } = CFG;

  let state = STATE.START;
  let score = 0;
  let hiScore = parseInt(localStorage.getItem('galaxyShooterV4Hi')) || 0;
  let lives = 3;
  let wave  = 1;

  // Warp
  let warpTimer = 0, warpLines = [];

  // Theme color lerp
  let currentTheme = '#00ffff', targetTheme = '#00ffff', themeTimer = 0;
  const waveThemes = ['#00ffff','#ff00ff','#ffcc00'];
  function getTheme(w) { return w%3===0 ? '#ff2200' : waveThemes[(w-1)%3]; }
  function lerpColor(a, b, t) {
    const p = (s,o) => parseInt(s.slice(o,o+2),16);
    const lerp = (x,y) => Math.round(x+(y-x)*t);
    const r=lerp(p(a,1),p(b,1)), g=lerp(p(a,3),p(b,3)), bl=lerp(p(a,5),p(b,5));
    return '#'+((1<<24)+(r<<16)+(g<<8)+bl).toString(16).slice(1);
  }

  // Player
  let player = {};
  function resetPlayer() {
    player = { x: W/2, y: H-60, vx: 0, width: CFG.player.width, height: CFG.player.height, invincible: 0, speedBoost: 0, shield: 0, bankAngle: 0 };
  }

  // 3D Starfield
  const stars = Array.from({length:200},()=>({ x:(Math.random()-0.5)*800, y:(Math.random()-0.5)*600, z:Math.random() }));

  // Game objects
  let bullets = [], homingMissiles = [], plasmaBombs = [];
  let enemies = [], enemyBullets = [];
  let powerups = [];
  let boss = null;
  let enemyShootTimer = 0;

  // Weapons
  let weaponIdx = 0, cooldownTimer = 0, laserActive = false, laserHumTimer = 0;
  let railgunFlash = { timer: 0, x: 0 };

  // Combo
  let combo = 0, comboTimer = 0, comboDisplayTimer = 0;

  // Narrator taunt history (avoid repeating a phase trigger)
  let lastNarratorPhase = '';
  let narratorCheckTimer = 0;

  // ── helpers ──────────────────────────────────────────────

  function awardKill(pts, ep, color) {
    const mult = combo >= 2 ? Math.min(combo, CFG.combo.maxMult) : 1;
    const total = pts * mult;
    score += total;
    combo++; comboTimer = CFG.combo.window;
    if (combo >= 2) comboDisplayTimer = CFG.combo.displayDur;
    FX.spawnParticles(ep.x, ep.y, color, 12);
    FX.spawnShockwave(ep.x, ep.y);
    FX.spawnScorePopup(ep.x, ep.y-10, total, color);
    return total;
  }

  function maybeDropPowerup(x, y) {
    if (Math.random() > CFG.powerup.dropRate) return;
    const types = ['shield','spread','speed'];
    powerups.push({ x, y, type: types[Math.floor(Math.random()*types.length)], vy: 80, size: 14, time: 0 });
  }

  function processChainExplosions(positions) {
    let total = 0; let depth = 0;
    let cur = positions.slice();
    while (cur.length > 0 && depth < CFG.chain.maxDepth) {
      depth++;
      const next = [];
      cur.forEach(pos => {
        enemies.forEach(e => {
          if (e._dead) return;
          const ep = screenPos(e);
          if (Math.hypot(ep.x-pos.x, ep.y-pos.y) < CFG.chain.radius) {
            e.hp -= 1;
            if (e.hp <= 0) {
              e._dead = true; next.push({ x:ep.x, y:ep.y }); total++;
              const bonus = CFG.chain.bonusPts * (combo>=2?Math.min(combo,CFG.combo.maxMult):1);
              score += e.points + bonus;
              combo++; comboTimer = CFG.combo.window;
              if (combo >= 2) comboDisplayTimer = CFG.combo.displayDur;
              FX.spawnParticles(ep.x, ep.y, e.color, 8);
              FX.spawnShockwave(ep.x, ep.y);
              FX.spawnScorePopup(ep.x, ep.y-10, e.points+bonus, e.color);
              maybeDropPowerup(ep.x, ep.y);
              Audio.play('chainKill', 1 + total * 0.15);
            }
          }
        });
      });
      enemies = enemies.filter(e => !e._dead);
      cur = next;
    }
    if (total >= 2) {
      const last = positions[positions.length-1] || { x:W/2, y:H/2 };
      FX.spawnChainText(last.x, last.y-30, total);
    }
  }

  function killEnemy(e, ep) {
    e._dead = true;
    awardKill(e.points, ep, e.color);
    maybeDropPowerup(ep.x, ep.y);
    FX.triggerShake(2, 80);
    Audio.play('enemyDeath');
    return ep;
  }

  function killBoss() {
    if (!boss) return;
    const bp = project(boss.x3d, boss.y3d, boss.z);
    const ep = { x: bp.sx, y: bp.sy };
    awardKill(500, ep, '#ff00ff');
    ['#ff00ff','#ffff00','#ffffff'].forEach((c,i) => FX.spawnParticles(ep.x, ep.y, c, [50,30,20][i]));
    FX.flash(1); FX.triggerShake(15, 500);
    Audio.play('enemyDeath');
    boss = null;
  }

  function spawnWave() {
    enemyBullets = [];
    if (wave % 3 === 0) {
      boss = new BossAI(wave);
    } else {
      const count = wave===1?8:wave<=2?12:16;
      const speedMult = 1+(wave-1)*0.1;
      const cols = Math.min(count, 8);
      const rows = Math.ceil(count/cols);
      let spawned = 0;
      for (let r=0; r<rows && spawned<count; r++) {
        for (let c=0; c<cols && spawned<count; c++) {
          const typeRoll = Math.random();
          const type = typeRoll<0.4?'A':typeRoll<0.75?'B':'C';
          const def  = EnemyDefs[type];
          const x3d  = (c-(cols-1)/2)*80;
          const y3d  = r*40+20;
          enemies.push({
            type, x3d, y3d, z: 0.85+Math.random()*0.1,
            baseSize: def.baseSize, color: def.color,
            hp: def.hp, points: def.points,
            speed: def.speed * speedMult,
            phase: Math.random()*Math.PI*2,
            amplitude: 40+Math.random()*40+['A','B','C'].indexOf(type)*10,
            pattern: def.pattern,
            startX3d: x3d, startY3d: y3d, time: 0, _dead: false,
          });
          spawned++;
        }
      }
    }
  }

  function initWarp() {
    state = STATE.WARP;
    warpTimer = CFG.warpDuration;
    warpLines = Array.from({length:70},()=>({
      angle: Math.random()*Math.PI*2,
      startDist: 10+Math.random()*30, length: 20+Math.random()*60,
      speed: 300+Math.random()*400, width: 1+Math.random()*2,
      brightness: 0.5+Math.random()*0.5,
    }));
    Audio.play('warp');
  }

  function startGame() {
    state = STATE.PLAYING;
    score = 0; lives = 3; wave = 1;
    weaponIdx = 0; cooldownTimer = 0; laserActive = false; railgunFlash = { timer:0, x:0 };
    bullets = []; homingMissiles = []; plasmaBombs = [];
    enemies = []; enemyBullets = []; powerups = [];
    boss = null; combo = 0; comboTimer = 0; comboDisplayTimer = 0;
    enemyShootTimer = 0; warpTimer = 0; warpLines = [];
    currentTheme = getTheme(1); targetTheme = currentTheme; themeTimer = 0;
    lastNarratorPhase = ''; narratorCheckTimer = 0;
    // Reset name input state
    NameInput.active    = false;
    NameInput.value     = '';
    if (NameInput._el) NameInput._el.value = '';
    NameInput.submitted = false;
    NameInput.savedMsg  = 0;
    NameInput.cursorTimer = 0;
    showingLeaderboard  = false;
    resetPlayer();
    FX.reset();
    spawnWave();
    Audio.startDrone();
  }

  // ── update ────────────────────────────────────────────────

  function update(dt) {
    // Stars always update
    stars.forEach(s => { s.z -= 0.4*dt; if (s.z<=0) { s.z=1; s.x=(Math.random()-0.5)*800; s.y=(Math.random()-0.5)*600; } });
    FX.update(dt);
    NarratorAI.update(dt);
    if (NameInput.savedMsg > 0) NameInput.savedMsg -= dt;
    NameInput.cursorTimer += dt;

    if (state === STATE.PAUSED) return;

    // Theme lerp
    if (themeTimer > 0) { themeTimer -= dt; currentTheme = lerpColor(currentTheme, targetTheme, Math.min(1, dt*2)); }

    if (state === STATE.WARP) {
      warpTimer -= dt;
      warpLines.forEach(l => { l.startDist += l.speed*dt; l.length += l.speed*0.5*dt; });
      if (warpTimer <= 0) { state = STATE.PLAYING; spawnWave(); }
      return;
    }
    if (state !== STATE.PLAYING) return;

    if (railgunFlash.timer > 0) railgunFlash.timer -= dt;
    if (cooldownTimer > 0) { cooldownTimer -= dt*1000; if (cooldownTimer < 0) cooldownTimer = 0; }

    // ── player movement ──
    const moveAxis = Input.moveAxis();
    const maxSpeed = player.speedBoost > 0 ? CFG.player.boostSpeed : CFG.player.maxSpeed;
    if (moveAxis !== 0) player.vx += moveAxis * CFG.player.accel * dt;
    else {
      if (Math.abs(player.vx) < 20) player.vx = 0;
      else player.vx *= Math.max(0, 1 - CFG.player.friction * dt);
    }
    player.vx = Math.max(-maxSpeed, Math.min(maxSpeed, player.vx));
    player.x += player.vx * dt;
    if (player.x < player.width)   { player.x = player.width;   player.vx = 0; }
    if (player.x > W-player.width) { player.x = W-player.width; player.vx = 0; }
    player.bankAngle += ((player.vx/maxSpeed)*0.4 - player.bankAngle) * dt * 8;
    FX.spawnEngineTrail(player.x, player.y + player.height/3);
    if (player.invincible > 0) player.invincible -= dt;
    if (player.speedBoost > 0) player.speedBoost -= dt;
    if (player.shield > 0) player.shield -= dt;

    // ── shooting ──
    const wantShoot = Input.wantShoot();
    if (weaponIdx === 0) {
      laserActive = wantShoot;
      if (laserActive) {
        laserHumTimer += dt;
        if (laserHumTimer > 0.06) { laserHumTimer = 0; Audio.play('laserHum', 0.8+Math.random()*0.4); }
        const { dead, bossHit } = WeaponSystem.fireLaser(player, enemies, boss, dt);
        const deadPos = dead.map(ep => { killEnemy(enemies.find(e=>e._dead && !e._processed), ep); return ep; });
        enemies.filter(e=>e._dead&&!e._processed).forEach(e=>{ e._processed=true; });
        enemies = enemies.filter(e => !e._dead);
        if (deadPos.length > 0) processChainExplosions(deadPos);
        if (bossHit && boss && boss.hp <= 0) killBoss();
      }
    } else {
      laserActive = false;
      if (wantShoot && cooldownTimer <= 0) {
        const def = WeaponDefs[weaponIdx];
        cooldownTimer = def.cooldown;
        if (weaponIdx === 1) { WeaponSystem.fireSpread(player).forEach(b => bullets.push(b)); Audio.play('spread'); }
        if (weaponIdx === 2) { WeaponSystem.fireHoming(player).forEach(m => homingMissiles.push(m)); Audio.play('missile'); }
        if (weaponIdx === 3) { WeaponSystem.firePlasma(player).forEach(b => plasmaBombs.push(b)); Audio.play('plasma'); }
        if (weaponIdx === 4) {
          const { dead, bossHit, x } = WeaponSystem.fireRailgun(player, enemies, boss);
          railgunFlash = { timer: 0.15, x };
          const deadPos = [];
          dead.forEach(ep => { deadPos.push(ep); FX.spawnParticles(ep.x, ep.y, '#ffffff', 10); FX.spawnShockwave(ep.x, ep.y); FX.spawnScorePopup(ep.x, ep.y-10, 0, '#ffffff'); maybeDropPowerup(ep.x, ep.y); });
          enemies = enemies.filter(e => !e._dead);
          if (deadPos.length > 0) processChainExplosions(deadPos);
          if (bossHit) { FX.triggerShake(8, 200); Audio.play('bossHit'); if (boss && boss.hp<=0) killBoss(); }
          Audio.play('railgun'); FX.triggerShake(4, 100); FX.flash(0.3);
        }
      }
    }

    // ── bullets (spread) ──
    bullets = bullets.filter(b => { b.x+=b.vx*dt; b.y+=b.vy*dt; return b.y>-20&&b.x>-20&&b.x<W+20; });

    // ── homing missiles ──
    homingMissiles = homingMissiles.filter(m => {
      m.life -= dt;
      if (m.life <= 0) return false;
      // Steer toward nearest target
      let target = null; let minDist = Infinity;
      enemies.forEach(e => { if (e._dead) return; const ep=screenPos(e); const d=Math.hypot(ep.x-m.x,ep.y-m.y); if(d<minDist){minDist=d;target=ep;} });
      if (!target && boss && boss.entered) { const bp=project(boss.x3d,boss.y3d,boss.z); target={x:bp.sx,y:bp.sy}; }
      if (target) {
        let diff = Math.atan2(target.y-m.y,target.x-m.x) - m.angle;
        while (diff > Math.PI) diff -= Math.PI*2;
        while (diff < -Math.PI) diff += Math.PI*2;
        const turn = 4*Math.PI/180*60;
        m.angle += Math.abs(diff)<turn*dt ? diff : Math.sign(diff)*turn*dt;
      }
      m.x += Math.cos(m.angle)*m.speed*dt;
      m.y += Math.sin(m.angle)*m.speed*dt;
      FX.spawnMissileTrail(m.x, m.y);
      return m.x>-20&&m.x<W+20&&m.y>-40&&m.y<H+20;
    });

    // ── plasma bombs ──
    plasmaBombs = plasmaBombs.filter(pb => {
      pb.y += pb.vy*dt; pb.pulsePhase += dt*8;
      let explode = pb.y < 20;
      if (!explode) { for (const e of enemies) { if (e._dead) continue; const ep=screenPos(e); if(Math.hypot(ep.x-pb.x,ep.y-pb.y)<ep.size+pb.radius){explode=true;break;} } }
      if (!explode && boss && boss.entered) { const bp=project(boss.x3d,boss.y3d,boss.z); if(Math.hypot(bp.sx-pb.x,bp.sy-pb.y)<boss.baseSize*bp.scale+pb.radius) explode=true; }
      if (explode) {
        const R = 100;
        FX.spawnParticles(pb.x, pb.y, '#ff00ff', 30); FX.spawnParticles(pb.x, pb.y, '#ff88ff', 20);
        FX.spawnShockwave(pb.x, pb.y, R); FX.triggerShake(8, 200); FX.flash(0.4);
        Audio.play('plasmaExplode');
        const deadPos = [];
        enemies.forEach(e => {
          if (e._dead) return;
          const ep = screenPos(e);
          if (Math.hypot(ep.x-pb.x, ep.y-pb.y) < R) {
            e.hp -= 2;
            if (e.hp <= 0) { e._dead=true; deadPos.push(ep); awardKill(e.points,ep,e.color); maybeDropPowerup(ep.x,ep.y); Audio.play('enemyDeath'); }
          }
        });
        enemies = enemies.filter(e => !e._dead);
        if (deadPos.length > 0) processChainExplosions(deadPos);
        if (boss && boss.entered) { const bp=project(boss.x3d,boss.y3d,boss.z); if(Math.hypot(bp.sx-pb.x,bp.sy-pb.y)<R+boss.baseSize*bp.scale){boss.hp-=3;FX.triggerShake(5,150);Audio.play('bossHit');if(boss.hp<=0)killBoss();} }
        return false;
      }
      return true;
    });

    // ── enemy movement ──
    enemies.forEach(e => {
      if (e._dead) return;
      e.time += dt; e.z -= e.speed*dt; e.phase += dt*2;
      // y3d grows as enemy approaches (z shrinks), pulling it down toward player
      e.y3d = e.startY3d + (0.9 - e.z) * 420;
      (MovementPatterns[e.pattern] || MovementPatterns.formation)(e, dt);
    });
    enemies = enemies.filter(e => !e._dead && e.z > -0.05);

    // ── enemy shooting ──
    enemyShootTimer += dt;
    if (enemyShootTimer > 2) {
      enemyShootTimer = 0;
      const close = enemies.filter(e => e.z < 0.5);
      if (close.length > 0) {
        const shooter = close[Math.floor(Math.random()*close.length)];
        const ep = screenPos(shooter);
        const a = Math.atan2(player.y-ep.y, player.x-ep.x);
        enemyBullets.push({ x:ep.x, y:ep.y, vx:Math.cos(a)*200, vy:Math.sin(a)*200, color:'#ff4444', radius:4 });
      }
    }
    enemyBullets = enemyBullets.filter(b => { b.x+=b.vx*dt; b.y+=b.vy*dt; return b.y<H+20&&b.y>-20&&b.x>-20&&b.x<W+20; });

    // ── boss ──
    if (boss) {
      boss.update(dt);
      if (boss.entered) {
        const bp = project(boss.x3d, boss.y3d, boss.z);
        const newBullets = boss.tryShoot(bp.sx, bp.sy, player.x, player.y);
        newBullets.forEach(b => enemyBullets.push(b));

        // Narrator trigger per phase change
        narratorCheckTimer += dt;
        if (narratorCheckTimer > 1) {
          narratorCheckTimer = 0;
          if (boss.phaseName !== lastNarratorPhase) {
            lastNarratorPhase = boss.phaseName;
            NarratorAI.trigger(boss.hpPct, wave, score);
          }
        }
      }
    }

    // ── bullet vs enemy collision ──
    const removeBullet = new Set();
    const removeMissile = new Set();
    const deadPos = [];

    bullets.forEach((b, bi) => {
      if (removeBullet.has(bi)) return;
      let hit = false;
      for (const e of enemies) {
        if (e._dead) continue;
        const ep = screenPos(e);
        if (Math.hypot(b.x-ep.x, b.y-ep.y) < ep.size+(b.radius||4)) {
          removeBullet.add(bi); e.hp-=(b.damage||1);
          if (e.hp<=0) { killEnemy(e, ep); deadPos.push(ep); }
          hit=true; break;
        }
      }
      if (!hit && boss && boss.entered) {
        const bp = project(boss.x3d, boss.y3d, boss.z);
        if (Math.hypot(b.x-bp.sx, b.y-bp.sy) < boss.baseSize*bp.scale+(b.radius||4)) {
          removeBullet.add(bi); boss.hp-=(b.damage||1);
          FX.triggerShake(5,150); Audio.play('bossHit'); FX.spawnParticles(b.x,b.y,'#ff00ff',6);
          if (boss.hp<=0) killBoss();
        }
      }
    });

    homingMissiles.forEach((m, mi) => {
      if (removeMissile.has(mi)) return;
      for (const e of enemies) {
        if (e._dead) continue;
        const ep = screenPos(e);
        if (Math.hypot(m.x-ep.x, m.y-ep.y) < ep.size+10) {
          removeMissile.add(mi); e.hp-=m.damage;
          FX.spawnParticles(m.x,m.y,'#ff6600',8);
          if (e.hp<=0) { killEnemy(e,ep); deadPos.push(ep); }
          break;
        }
      }
      if (!removeMissile.has(mi) && boss && boss.entered) {
        const bp = project(boss.x3d, boss.y3d, boss.z);
        if (Math.hypot(m.x-bp.sx, m.y-bp.sy) < boss.baseSize*bp.scale+10) {
          removeMissile.add(mi); boss.hp-=1;
          FX.triggerShake(5,150); Audio.play('bossHit'); FX.spawnParticles(m.x,m.y,'#ff6600',8);
          if (boss.hp<=0) killBoss();
        }
      }
    });

    bullets = bullets.filter((_,i) => !removeBullet.has(i));
    homingMissiles = homingMissiles.filter((_,i) => !removeMissile.has(i));
    enemies = enemies.filter(e => !e._dead);
    if (deadPos.length > 0) processChainExplosions(deadPos);

    // ── combo decay ──
    if (comboTimer > 0) { comboTimer -= dt; if (comboTimer<=0) combo=0; }
    if (comboDisplayTimer > 0) comboDisplayTimer -= dt;

    // ── player collision ──
    const isProtected = player.invincible > 0 || player.shield > 0;
    if (!isProtected) {
      let hit = false;
      for (const e of enemies) { const ep=screenPos(e); if(Math.hypot(ep.x-player.x,ep.y-player.y)<ep.size+12){hit=true;break;} }
      if (!hit) for (const b of enemyBullets) { if(Math.abs(b.x-player.x)<14&&Math.abs(b.y-player.y)<18){hit=true;break;} }
      if (hit) {
        lives--; player.invincible = CFG.player.invincibleDur;
        FX.triggerShake(15, 500); Audio.play('playerHit');
        FX.spawnParticles(player.x, player.y, '#00ffff', 20);
        enemyBullets = [];
        if (lives <= 0) {
          state = STATE.GAMEOVER;
          NameInput.active = true;
          NameInput.value = localStorage.getItem('galaxyShooterName') || '';
          if (NameInput._el) { NameInput._el.value = NameInput.value; NameInput._el.focus(); }
          Audio.stopDrone();
          if (score > hiScore) { hiScore=score; localStorage.setItem('galaxyShooterV4Hi', String(hiScore)); }
        }
      }
    } else if (player.shield > 0 && player.invincible <= 0) {
      enemyBullets = enemyBullets.filter(b => {
        if (Math.abs(b.x-player.x)<20 && Math.abs(b.y-player.y)<24) { FX.spawnParticles(player.x,player.y,'#4488ff',5); return false; }
        return true;
      });
    }

    // ── power-up collection ──
    powerups = powerups.filter(p => {
      p.y += p.vy*dt; p.time += dt;
      if (p.y > H+20) return false;
      if (Math.abs(p.x-player.x)<22 && Math.abs(p.y-player.y)<22) {
        Audio.play('powerup');
        if (p.type==='shield')  player.shield = CFG.player.shieldDur;
        if (p.type==='spread')  { weaponIdx=1; cooldownTimer=0; }
        if (p.type==='speed')   player.speedBoost = CFG.player.boostDur;
        return false;
      }
      return true;
    });

    // ── wave clear ──
    if (enemies.length===0 && !boss) {
      wave++;
      if (score > hiScore) { hiScore=score; localStorage.setItem('galaxyShooterV4Hi', String(hiScore)); }
      targetTheme = getTheme(wave); themeTimer = 1.0;
      initWarp();
    }
  }

  // ============================================================
  // RENDERER
  // ============================================================
  function draw() {
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);

    if (state===STATE.START || state===STATE.CHANGELOG) {
      if (state===STATE.CHANGELOG) drawChangelog(); else drawStart();
      return;
    }

    const enraged = boss && boss.entered && boss.hpPct < CFG.bossPhases.enraged;
    const redTint = enraged ? 0.08 + Math.sin(performance.now()*0.005)*0.04 : 0;

    ctx.save();
    const s = FX.shake;
    ctx.translate(s.x, s.y);

    drawStarfield();
    drawGrid();
    drawEngineTrail();
    drawParticles();
    drawShockwaves();
    drawPowerups();
    drawEnemyBullets();
    enemies.slice().sort((a,b)=>b.z-a.z).forEach(e=>drawEnemy(e));
    drawBoss();
    drawLaser();
    drawRailgunFlash();
    drawBullets();
    drawHomingMissiles();
    drawPlasmaBombs();
    drawScorePopups();
    drawChainTexts();
    if (state !== STATE.GAMEOVER) drawPlayer();

    ctx.restore();

    if (redTint>0) { ctx.fillStyle=`rgba(255,0,0,${redTint.toFixed(3)})`; ctx.fillRect(0,0,W,H); }
    if (FX.flashAlpha>0) { ctx.fillStyle=`rgba(255,255,255,${FX.flashAlpha.toFixed(2)})`; ctx.fillRect(0,0,W,H); }
    if (state===STATE.WARP) drawWarp();

    drawHUD();
    drawNarrator();
    if (state===STATE.PAUSED) drawPause();
    if (state===STATE.GAMEOVER) drawGameOver();
    if (state===STATE.PLAYING || state===STATE.WARP) drawTouchControls();
  }

  function drawStarfield() {
    stars.forEach(s => {
      const p = project(s.x, s.y, s.z);
      const size = (1-s.z)*3+0.5, alpha = 1-s.z;
      ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
      ctx.fillRect(p.sx-size/2, p.sy-size/2, size, size);
    });
  }

  function drawGrid() {
    ctx.save(); ctx.globalAlpha=0.12; ctx.strokeStyle='#004444'; ctx.lineWidth=1;
    for (let i=1;i<=8;i++) { const z=i/8,sc=CFG.FOV/(CFG.FOV+z*600),y=CFG.VP.y+280*sc,hw=400*sc; ctx.beginPath();ctx.moveTo(CFG.VP.x-hw,y);ctx.lineTo(CFG.VP.x+hw,y);ctx.stroke(); }
    for (let i=0;i<12;i++) { const xo=(i-5.5)*55; ctx.beginPath();ctx.moveTo(CFG.VP.x+xo,H-20);ctx.lineTo(CFG.VP.x+xo*0.05,CFG.VP.y+20);ctx.stroke(); }
    ctx.restore();
  }

  function drawPlayer() {
    if (player.invincible>0 && Math.floor(player.invincible*8)%2===0) return;
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.transform(1,0,player.bankAngle*0.8,1,0,0);
    if (player.shield>0) {
      const visible = player.shield>=2||Math.floor(player.shield*8)%2===0;
      if (visible) {
        ctx.save(); ctx.rotate(performance.now()*0.001);
        ctx.shadowBlur=20; ctx.shadowColor='#4488ff'; ctx.strokeStyle='#4488ff'; ctx.lineWidth=2.5;
        ctx.beginPath(); for(let i=0;i<6;i++){const a=(Math.PI/3)*i,px=Math.cos(a)*35,py=Math.sin(a)*35;i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);} ctx.closePath(); ctx.stroke();
        ctx.shadowBlur=0; ctx.restore();
      }
    }
    const ph = player.height, pw = player.width;
    ctx.shadowBlur=15; ctx.shadowColor=currentTheme; ctx.fillStyle=currentTheme;
    ctx.beginPath(); ctx.moveTo(0,-ph/2); ctx.lineTo(-pw/2-4,ph/2); ctx.lineTo(-pw/4,ph/3); ctx.lineTo(0,ph/2.5); ctx.lineTo(pw/4,ph/3); ctx.lineTo(pw/2+4,ph/2); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#003344'; ctx.beginPath(); ctx.moveTo(0,-ph/4); ctx.lineTo(-5,ph/6); ctx.lineTo(5,ph/6); ctx.closePath(); ctx.fill();
    const pulse = Math.sin(performance.now()*0.02)*2+4;
    ctx.shadowBlur=12; ctx.shadowColor='#00ff88'; ctx.fillStyle='#00ff88';
    ctx.beginPath(); ctx.arc(-7,ph/3+3,pulse,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7,ph/3+3,pulse,0,Math.PI*2); ctx.fill();
    const flicker=Math.random()*6; ctx.fillStyle='#00ffcc';
    ctx.beginPath(); ctx.moveTo(-9,ph/3+2); ctx.lineTo(-7,ph/2+5+flicker); ctx.lineTo(-5,ph/3+2); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(5,ph/3+2);  ctx.lineTo(7,ph/2+5+flicker);  ctx.lineTo(9,ph/3+2);  ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0; ctx.restore();
  }

  function drawEnemy(e) {
    const ep = screenPos(e);
    const size=ep.size, alpha=e.z>0.85?1-(e.z-0.85)/0.15:1;
    ctx.save(); ctx.translate(ep.x,ep.y); ctx.globalAlpha=Math.max(0.1,alpha);
    ctx.shadowBlur=12*ep.scale; ctx.shadowColor=e.color; ctx.fillStyle=e.color; ctx.strokeStyle=e.color; ctx.lineWidth=2*ep.scale;
    if (e.type==='A') {
      ctx.beginPath(); ctx.moveTo(0,-size); ctx.lineTo(size*0.7,0); ctx.lineTo(0,size); ctx.lineTo(-size*0.7,0); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#220000'; ctx.beginPath(); ctx.moveTo(0,-size*0.4); ctx.lineTo(size*0.25,0); ctx.lineTo(0,size*0.4); ctx.lineTo(-size*0.25,0); ctx.closePath(); ctx.fill();
    } else if (e.type==='B') {
      ctx.beginPath(); for(let i=0;i<6;i++){const a=(Math.PI/3)*i-Math.PI/2;const px=Math.cos(a)*size,py=Math.sin(a)*size;i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);} ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#ffcc00'; ctx.lineWidth=1.5*ep.scale;
      ctx.beginPath(); ctx.moveTo(-size*1.2,0); ctx.lineTo(-size*0.5,0); ctx.moveTo(size*0.5,0); ctx.lineTo(size*1.2,0); ctx.stroke();
      ctx.fillStyle='#331100'; ctx.beginPath(); ctx.arc(0,0,size*0.4,0,Math.PI*2); ctx.fill();
    } else {
      ctx.beginPath(); for(let i=0;i<8;i++){const a=(Math.PI/4)*i-Math.PI/8;const px=Math.cos(a)*size,py=Math.sin(a)*size;i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);} ctx.closePath(); ctx.fill();
      ctx.fillStyle='#ff6600'; ctx.shadowColor='#ff6600'; ctx.shadowBlur=8*ep.scale;
      ctx.beginPath(); ctx.arc(-size*0.4,size*0.5,size*0.2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(size*0.4,size*0.5,size*0.2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#443300'; ctx.beginPath(); ctx.arc(0,0,size*0.35,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
  }

  function drawBoss() {
    if (!boss) return;
    const bp = project(boss.x3d, boss.y3d, boss.z);
    const bossSize = boss.baseSize * bp.scale;
    const hpPct = boss.hpPct;
    const pulse = Math.sin(boss.phase)*8+20;
    ctx.save(); ctx.translate(bp.sx, bp.sy);
    ctx.shadowBlur = hpPct<0.3?pulse+20:pulse; ctx.shadowColor = hpPct<0.3?'#ff0000':'#ff00ff';
    const w=bossSize, h=bossSize*0.75;
    ctx.fillStyle = hpPct<0.3?'#ff2200':'#ff00ff';
    ctx.beginPath();
    ctx.moveTo(0,-h); ctx.lineTo(w*0.6,-h*0.7); ctx.lineTo(w,-h*0.2); ctx.lineTo(w*1.1,0); ctx.lineTo(w,h*0.3); ctx.lineTo(w*0.7,h*0.6); ctx.lineTo(w*0.3,h); ctx.lineTo(-w*0.3,h); ctx.lineTo(-w*0.7,h*0.6); ctx.lineTo(-w,h*0.3); ctx.lineTo(-w*1.1,0); ctx.lineTo(-w,-h*0.2); ctx.lineTo(-w*0.6,-h*0.7); ctx.closePath(); ctx.fill();
    ctx.fillStyle = hpPct<0.3?'#cc0000':'#cc00cc';
    ctx.beginPath(); ctx.moveTo(-w*1.1,0); ctx.lineTo(-w-10*bp.scale,-15*bp.scale); ctx.lineTo(-w-10*bp.scale,15*bp.scale); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(w*1.1,0);  ctx.lineTo(w+10*bp.scale,-15*bp.scale);  ctx.lineTo(w+10*bp.scale,15*bp.scale);  ctx.closePath(); ctx.fill();
    ctx.shadowBlur=15; ctx.shadowColor='#ffffff'; ctx.fillStyle='#ff88ff'; ctx.beginPath(); ctx.arc(0,0,14*bp.scale,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.arc(0,0,6*bp.scale,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.restore();
    // HP bar
    const bw=240,bh=18,bx=(W-bw)/2,by=12;
    ctx.fillStyle='#222'; ctx.fillRect(bx-1,by-1,bw+2,bh+2);
    ctx.fillStyle='#440000'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#ff0044'; ctx.shadowBlur=6; ctx.shadowColor='#ff0044';
    ctx.fillRect(bx,by,bw*Math.max(0,hpPct),bh); ctx.shadowBlur=0;
    ctx.strokeStyle='#ff00ff'; ctx.lineWidth=1; ctx.strokeRect(bx-1,by-1,bw+2,bh+2);
    ctx.fillStyle='#ffffff'; ctx.font='bold 11px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(`BOSS HP: ${Math.max(0,Math.ceil(boss.hp))} / ${boss.maxHp}`, W/2, by+bh/2);
    // Phase label
    const phaseColor = { patrol:'#00ffff', aggressive:'#ff8800', enraged:'#ff2200' }[boss.phaseName];
    ctx.font='10px monospace'; ctx.fillStyle=phaseColor;
    ctx.fillText(boss.phaseName.toUpperCase(), W/2, by+bh+14);
  }

  function drawLaser() {
    if (!laserActive) return;
    const w = 3+Math.random()*2;
    ctx.save();
    ctx.shadowBlur=20; ctx.shadowColor='#00ffff'; ctx.strokeStyle='#00ffff'; ctx.lineWidth=w; ctx.globalAlpha=0.9;
    ctx.beginPath(); ctx.moveTo(player.x,player.y-player.height/2); ctx.lineTo(player.x,0); ctx.stroke();
    ctx.globalAlpha=0.3; ctx.lineWidth=w+6;
    ctx.beginPath(); ctx.moveTo(player.x,player.y-player.height/2); ctx.lineTo(player.x,0); ctx.stroke();
    ctx.restore();
  }

  function drawRailgunFlash() {
    if (railgunFlash.timer<=0) return;
    const alpha = railgunFlash.timer/0.15;
    ctx.save();
    ctx.globalAlpha=alpha; ctx.shadowBlur=30; ctx.shadowColor='#ffffff'; ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(railgunFlash.x,player.y-player.height/2); ctx.lineTo(railgunFlash.x,0); ctx.stroke();
    ctx.globalAlpha=alpha*0.5; ctx.strokeStyle='#88ccff'; ctx.lineWidth=6;
    ctx.beginPath(); ctx.moveTo(railgunFlash.x,player.y-player.height/2); ctx.lineTo(railgunFlash.x,0); ctx.stroke();
    ctx.restore();
  }

  function drawBullets() {
    bullets.forEach(b => {
      ctx.shadowBlur=10; ctx.shadowColor=b.color||'#00ff88'; ctx.fillStyle=b.color||'#00ff88';
      ctx.beginPath(); ctx.arc(b.x,b.y,b.radius||4,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.4; ctx.beginPath(); ctx.arc(b.x,b.y,(b.radius||4)+2,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
    }); ctx.shadowBlur=0;
  }

  function drawHomingMissiles() {
    homingMissiles.forEach(m => {
      ctx.save(); ctx.translate(m.x,m.y); ctx.rotate(m.angle+Math.PI/2);
      ctx.shadowBlur=8; ctx.shadowColor='#ff4444'; ctx.fillStyle='#ff4444';
      ctx.beginPath(); ctx.ellipse(0,0,4,10,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.ellipse(0,-8,2,4,0,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0; ctx.restore();
    });
    FX.missileTrails.forEach(p => { ctx.globalAlpha=p.life*0.6; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill(); });
    ctx.globalAlpha=1;
  }

  function drawPlasmaBombs() {
    plasmaBombs.forEach(pb => {
      const r=pb.radius+Math.sin(pb.pulsePhase)*4;
      ctx.save(); ctx.shadowBlur=25; ctx.shadowColor='#ff00ff'; ctx.fillStyle='#ff00ff'; ctx.globalAlpha=0.7;
      ctx.beginPath(); ctx.arc(pb.x,pb.y,r,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.4; ctx.fillStyle='#ff88ff'; ctx.beginPath(); ctx.arc(pb.x,pb.y,r+6,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.arc(pb.x,pb.y,r*0.4,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0; ctx.restore();
    });
  }

  function drawEnemyBullets() {
    enemyBullets.forEach(b => {
      ctx.shadowBlur=8; ctx.shadowColor=b.color||'#ff4444'; ctx.fillStyle=b.color||'#ff4444';
      ctx.beginPath(); ctx.arc(b.x,b.y,b.radius||4,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.4; ctx.beginPath(); ctx.arc(b.x,b.y,(b.radius||4)+2,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
    }); ctx.shadowBlur=0;
  }

  function drawParticles() {
    FX.particles.forEach(p => { ctx.globalAlpha=Math.max(0,p.life); ctx.shadowBlur=4; ctx.shadowColor=p.color; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); });
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }

  function drawEngineTrail() {
    FX.engineTrail.forEach(p => { ctx.globalAlpha=(p.life/p.maxLife)*0.7; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); });
    ctx.globalAlpha=1;
  }

  function drawShockwaves() {
    FX.shockwaves.forEach(s => { ctx.globalAlpha=(s.life/s.maxLife)*0.7; ctx.strokeStyle='#00ffff'; ctx.shadowBlur=10; ctx.shadowColor='#00ffff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(s.x,s.y,s.radius,0,Math.PI*2); ctx.stroke(); ctx.shadowBlur=0; });
    ctx.globalAlpha=1;
  }

  function drawScorePopups() {
    FX.scorePopups.forEach(p => { ctx.globalAlpha=p.life/p.maxLife; ctx.fillStyle=p.color; ctx.font='bold 16px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(p.text,p.x,p.y); });
    ctx.globalAlpha=1;
  }

  function drawChainTexts() {
    FX.chainTexts.forEach(c => { ctx.globalAlpha=c.life/c.maxLife; ctx.fillStyle='#ffffff'; ctx.shadowBlur=10; ctx.shadowColor='#00ffff'; ctx.font='bold 20px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(c.text,c.x,c.y); ctx.shadowBlur=0; });
    ctx.globalAlpha=1;
  }

  function drawPowerups() {
    powerups.forEach(p => {
      ctx.save(); ctx.translate(p.x,p.y);
      const color = p.type==='shield'?'#4488ff':p.type==='spread'?'#ffcc00':'#00ff44';
      const letter = p.type==='shield'?'S':p.type==='spread'?'W':'V';
      const pu = Math.sin(p.time*5)*0.3+0.7;
      ctx.shadowBlur=18*pu; ctx.shadowColor=color; ctx.strokeStyle=color; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(0,0,p.size,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=0.2; ctx.fillStyle=color; ctx.fill(); ctx.globalAlpha=1;
      ctx.shadowBlur=8; ctx.fillStyle=color; ctx.font='bold 14px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(letter,0,1);
      ctx.shadowBlur=0; ctx.restore();
    });
  }

  function drawHUD() {
    ctx.shadowBlur=0; ctx.font='bold 16px monospace'; ctx.textBaseline='top';
    ctx.fillStyle=currentTheme; ctx.textAlign='left'; ctx.fillText('SCORE: '+score, 12, 10);
    ctx.textAlign='center'; ctx.fillText('HI: '+hiScore, W/2, 10);
    ctx.textAlign='right'; ctx.fillStyle='#ff4444';
    ctx.fillText('❤ '.repeat(lives).trim(), W-12, 10);
    ctx.fillStyle=currentTheme; ctx.font='13px monospace'; ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText('WAVE '+wave, 12, 30);
    ctx.textAlign='right'; ctx.font='11px monospace';
    let ty=30;
    if(player.shield>0){ctx.fillStyle='#4488ff';ctx.fillText('SHIELD '+player.shield.toFixed(1)+'s',W-12,ty);ty+=14;}
    if(player.speedBoost>0){ctx.fillStyle='#00ff44';ctx.fillText('SPEED '+player.speedBoost.toFixed(1)+'s',W-12,ty);}
    drawWeaponHUD();
    if (comboDisplayTimer>0&&combo>=2) {
      const mult=Math.min(combo,CFG.combo.maxMult), alpha=Math.min(1,comboDisplayTimer), scale=1+(1-alpha)*0.3;
      ctx.save(); ctx.translate(W/2,H/2-60); ctx.scale(scale,scale);
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='bold 38px monospace';
      ctx.shadowBlur=20; ctx.shadowColor='#ffff00'; ctx.fillStyle=`rgba(255,255,0,${alpha.toFixed(2)})`;
      ctx.fillText('x'+mult+' COMBO!',0,0); ctx.shadowBlur=0; ctx.restore();
    }
  }

  function drawWeaponHUD() {
    const bx=12, by=H-40;
    for(let i=0;i<5;i++){
      const active=i===weaponIdx;
      ctx.fillStyle=active?WeaponDefs[i].color:'#444';
      ctx.font=active?'bold 12px monospace':'11px monospace';
      ctx.textAlign='center'; ctx.textBaseline='bottom';
      ctx.fillText(String(i+1),bx+i*22+8,by-18);
      if(active) ctx.fillRect(bx+i*22+2,by-16,12,2);
    }
    const wdef=WeaponDefs[weaponIdx];
    ctx.fillStyle=wdef.color; ctx.font='bold 14px monospace'; ctx.textAlign='left'; ctx.textBaseline='bottom';
    ctx.fillText(wdef.name,bx,by);
    if(wdef.cooldown>0){
      const bw=80,bh=6,by2=by+4,pct=Math.max(0,cooldownTimer/wdef.cooldown);
      ctx.fillStyle='#333'; ctx.fillRect(bx,by2,bw,bh);
      ctx.fillStyle=wdef.color; ctx.fillRect(bx,by2,bw*(1-pct),bh);
      if(weaponIdx===4&&cooldownTimer>0){ctx.fillStyle='#aaa';ctx.font='10px monospace';ctx.textBaseline='top';ctx.fillText('CHARGING...',bx+bw+5,by2-1);}
    }
  }

  function drawNarrator() {
    if (!NarratorAI.isVisible) return;
    const msg = NarratorAI.message;
    ctx.save();
    ctx.font = 'bold 15px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowBlur = 18; ctx.shadowColor = '#ff00ff';
    ctx.fillStyle = 'rgba(255,0,255,0.92)';
    ctx.fillText(msg, W/2, H/2 + 90);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawWarp() {
    const elapsed = CFG.warpDuration - warpTimer, progress = elapsed/CFG.warpDuration;
    const darken = progress<0.53?Math.min(0.85,progress*1.6):0.85*(1-(progress-0.53)/0.47);
    ctx.fillStyle=`rgba(0,0,0,${darken.toFixed(2)})`; ctx.fillRect(0,0,W,H);
    const brightness = progress<0.53?Math.min(1,progress/0.4):Math.max(0,1-(progress-0.53)/0.47);
    ctx.save(); ctx.translate(W/2,H/2);
    warpLines.forEach(l => {
      const a=brightness*l.brightness; if(a<=0)return;
      const x1=Math.cos(l.angle)*l.startDist, y1=Math.sin(l.angle)*l.startDist;
      const x2=Math.cos(l.angle)*(l.startDist+l.length), y2=Math.sin(l.angle)*(l.startDist+l.length);
      ctx.strokeStyle=`rgba(200,255,255,${a.toFixed(2)})`; ctx.lineWidth=l.width; ctx.shadowBlur=5; ctx.shadowColor='#00ffff';
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    });
    ctx.restore(); ctx.shadowBlur=0;
    const ts = progress<0.4?0.1+(progress/0.4)*1.4:progress<0.7?1.5-((progress-0.4)/0.3)*0.5:1.0;
    const ta = progress<0.1?progress/0.1:progress>0.85?(1-progress)/0.15:1;
    ctx.save(); ctx.translate(W/2,H/2); ctx.scale(ts,ts); ctx.globalAlpha=Math.max(0,ta);
    ctx.shadowBlur=30; ctx.shadowColor='#ffffff'; ctx.fillStyle='#ffffff'; ctx.font='bold 52px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('WAVE '+wave,0,0); ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
  }

  function drawTouchControls() {
    if (!Input.isTouchDevice) return;
    const { joystickPos, fireButtonPos, JOYSTICK_R, FIRE_R, WEAPON_BTN_R, WEAPON_BTN_Y, WEAPON_BTN_X0, WEAPON_BTN_DX } = Input;
    const jv = Input.getJoystick(), fv = Input.getFire();
    ctx.globalAlpha=0.4; ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(joystickPos.x,joystickPos.y,JOYSTICK_R,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=0.7; ctx.fillStyle='#00ffff'; ctx.shadowBlur=10; ctx.shadowColor='#00ffff';
    ctx.beginPath(); ctx.arc(joystickPos.x+jv.value*JOYSTICK_R,joystickPos.y,20,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    ctx.globalAlpha=fv.active?0.8:0.5; ctx.fillStyle=fv.active?'#ff4444':'#cc2222'; ctx.shadowBlur=fv.active?20:10; ctx.shadowColor='#ff0000';
    ctx.beginPath(); ctx.arc(fireButtonPos.x,fireButtonPos.y,FIRE_R,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    ctx.strokeStyle='#ff6666'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(fireButtonPos.x,fireButtonPos.y,FIRE_R,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=0.9; ctx.fillStyle='#ffffff'; ctx.font='bold 16px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('FIRE',fireButtonPos.x,fireButtonPos.y);
    for(let w=0;w<5;w++){
      const bx=WEAPON_BTN_X0+w*WEAPON_BTN_DX,by=WEAPON_BTN_Y,active=w===weaponIdx;
      ctx.globalAlpha=active?0.9:0.5; ctx.fillStyle=active?WeaponDefs[w].color:'#333';
      ctx.beginPath(); ctx.arc(bx,by,WEAPON_BTN_R,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle=WeaponDefs[w].color; ctx.lineWidth=active?3:1;
      ctx.beginPath(); ctx.arc(bx,by,WEAPON_BTN_R,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle='#ffffff'; ctx.font='bold 12px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(String(w+1),bx,by);
    }
    ctx.globalAlpha=1;
  }

  function drawStart() {
    drawStarfield(); drawGrid();
    ctx.shadowBlur=40; ctx.shadowColor='#00ffff'; ctx.fillStyle='#00ffff'; ctx.font='bold 52px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('GALAXY',W/2,H/2-80);
    ctx.shadowColor='#ff00ff'; ctx.fillStyle='#ff00ff'; ctx.fillText('SHOOTER',W/2,H/2-25);
    ctx.shadowBlur=0; ctx.fillStyle='#ffcc00'; ctx.font='bold 18px monospace';
    ctx.fillText('V4 — SYSTEMS ARCHITECTURE',W/2,H/2+15);
    ctx.shadowBlur=12; ctx.shadowColor='#00ff88'; ctx.fillStyle='#00ff88'; ctx.font='18px monospace';
    if (Math.floor(performance.now()/600)%2===0) ctx.fillText(Input.isTouchDevice?'TAP TO START':'PRESS SPACE TO START',W/2,H/2+55);
    ctx.shadowBlur=0; ctx.fillStyle='#666'; ctx.font='12px monospace';
    ctx.fillText(Input.isTouchDevice?'JOYSTICK=Move | FIRE=Shoot | 1-5=Weapons':'ARROWS/AD=Move | SPACE=Shoot | 1-5=Weapons | P=Pause',W/2,H/2+110);
    ctx.fillText('5 Weapons | 3D Enemies | Boss Battles | Claude AI Taunts',W/2,H/2+130);
    ctx.font='11px monospace';
    ['1:LASER','2:SPREAD','3:HOMING','4:PLASMA','5:RAIL'].forEach((t,i)=>{ ctx.fillStyle=WeaponDefs[i].color; ctx.fillText(t,W/2-120+i*60,H/2+155); });
    ctx.fillStyle='#444'; ctx.fillText('Press C to view CHANGELOG',W/2,H/2+175);
    // Leaderboard panel
    LeaderboardUI.drawLeaderboard(ctx, W/2, H/2+202);
  }

  function drawPause() {
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
    ctx.shadowBlur=25; ctx.shadowColor='#00ffff'; ctx.fillStyle='#00ffff'; ctx.font='bold 44px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('PAUSED',W/2,H/2); ctx.shadowBlur=0; ctx.fillStyle='#888'; ctx.font='16px monospace'; ctx.fillText('P to resume',W/2,H/2+45);
  }

  function drawGameOver() {
    ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fillRect(0,0,W,H);

    if (showingLeaderboard) {
      // Full leaderboard overlay
      ctx.save();
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowBlur=25; ctx.shadowColor='#00ffff'; ctx.fillStyle='#00ffff';
      ctx.font='bold 32px monospace'; ctx.fillText('LEADERBOARD', W/2, 60); ctx.shadowBlur=0;
      // Table header
      ctx.font='11px monospace'; ctx.fillStyle='#555';
      ctx.fillText('RANK  NAME              SCORE   WAVE', W/2, 100);
      ctx.strokeStyle='#333'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(W/2-170, 110); ctx.lineTo(W/2+170, 110); ctx.stroke();
      LeaderboardUI.drawLeaderboard(ctx, W/2, 125);
      // Bottom buttons
      const blink2 = Math.floor(performance.now()/600)%2===0;
      // BACK button
      const backBtn = { x: W/2-115, y: H-52, w: 100, h: 28 };
      ctx.fillStyle = '#333';
      ctx.beginPath();
      if (ctx.roundRect) { ctx.roundRect(backBtn.x, backBtn.y, backBtn.w, backBtn.h, 6); } else { ctx.rect(backBtn.x, backBtn.y, backBtn.w, backBtn.h); }
      ctx.fill();
      ctx.fillStyle='#aaa'; ctx.font='13px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('<- BACK', W/2-65, H-38);
      NameInput._backBtn = backBtn;
      // RESTART button
      const restartBtn2 = { x: W/2+15, y: H-52, w: 100, h: 28 };
      ctx.fillStyle = blink2 ? '#00ff88' : '#009944';
      ctx.beginPath();
      if (ctx.roundRect) { ctx.roundRect(restartBtn2.x, restartBtn2.y, restartBtn2.w, restartBtn2.h, 6); } else { ctx.rect(restartBtn2.x, restartBtn2.y, restartBtn2.w, restartBtn2.h); }
      ctx.fill();
      ctx.fillStyle='#000'; ctx.font='bold 13px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('> RESTART', W/2+65, H-38);
      NameInput._restartBtn2 = restartBtn2;
      ctx.restore();
      return;
    }

    // Normal game over screen
    ctx.shadowBlur=25; ctx.shadowColor='#ff4444'; ctx.fillStyle='#ff4444'; ctx.font='bold 46px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('GAME OVER',W/2,H/2-120); ctx.shadowBlur=0;
    ctx.fillStyle='#ffffff'; ctx.font='22px monospace'; ctx.fillText('SCORE: '+score,W/2,H/2-70);
    ctx.fillStyle='#ffcc00'; ctx.fillText('HI-SCORE: '+hiScore,W/2,H/2-40);

    // Name entry / submission UI
    ctx.save();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    if (!NameInput.submitted) {
      ctx.font='14px monospace'; ctx.fillStyle='#aaa';
      ctx.fillText('ENTER YOUR NAME:', W/2, H/2+5);
      ctx.strokeStyle='#FFD700'; ctx.lineWidth=1.5;
      ctx.strokeRect(W/2-85, H/2+15, 170, 26);
      ctx.fillStyle='rgba(255,215,0,0.08)'; ctx.fillRect(W/2-85, H/2+15, 170, 26);
      const cursor = Math.floor(NameInput.cursorTimer*2)%2===0 ? '|' : '';
      ctx.fillStyle='#FFD700'; ctx.font='bold 15px monospace';
      ctx.fillText((NameInput.value||'') + cursor, W/2, H/2+28);
      // SUBMIT button (shown when name has been typed)
      if (NameInput.value.length > 0) {
        const bx = W/2-50, by = H/2+55, bw = 100, bh = 28;
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        if (ctx.roundRect) { ctx.roundRect(bx, by, bw, bh, 6); } else { ctx.rect(bx, by, bw, bh); }
        ctx.fill();
        ctx.fillStyle = '#111';
        ctx.font = 'bold 13px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('SUBMIT', W/2, by + bh/2);
        // Store button bounds for hit testing
        NameInput._submitBtn = { x: bx, y: by, w: bw, h: bh };
      } else {
        NameInput._submitBtn = null;
        // hint text
        ctx.font='11px monospace'; ctx.fillStyle='#555'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(Input.isTouchDevice ? 'tap here to type your name' : 'type your name, then ENTER', W/2, H/2+52);
      }
    } else {
      if (NameInput.savedMsg > 0) {
        ctx.shadowBlur=12; ctx.shadowColor='#00ff88';
        ctx.font='bold 15px monospace'; ctx.fillStyle='#00ff88'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('SCORE SUBMITTED!', W/2, H/2+10);
        ctx.shadowBlur=0;
      }
      // Draw two action buttons
      const blink = Math.floor(performance.now()/600)%2===0;
      // RESTART button (green)
      const rb = { x: W/2-115, y: H/2+50, w: 105, h: 34 };
      ctx.fillStyle = blink ? '#00ff88' : '#009944';
      ctx.beginPath();
      if (ctx.roundRect) { ctx.roundRect(rb.x, rb.y, rb.w, rb.h, 8); } else { ctx.rect(rb.x, rb.y, rb.w, rb.h); }
      ctx.fill();
      ctx.fillStyle = '#000'; ctx.font = 'bold 13px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('> RESTART', rb.x + rb.w/2, rb.y + rb.h/2);
      // LEADERBOARD button (cyan)
      const lb = { x: W/2+10, y: H/2+50, w: 105, h: 34 };
      ctx.fillStyle = blink ? '#00ccff' : '#006688';
      ctx.beginPath();
      if (ctx.roundRect) { ctx.roundRect(lb.x, lb.y, lb.w, lb.h, 8); } else { ctx.rect(lb.x, lb.y, lb.w, lb.h); }
      ctx.fill();
      ctx.fillStyle = '#000'; ctx.font = 'bold 12px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('SCORES', lb.x + lb.w/2, lb.y + lb.h/2);
      // Store for hit testing
      NameInput._restartBtn = rb;
      NameInput._leaderboardBtn = lb;
    }
    ctx.restore();

    if (!NameInput.submitted && !NameInput.active && Math.floor(performance.now()/600)%2===0) {
      ctx.fillStyle='#00ff88'; ctx.font='16px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(Input.isTouchDevice?'TAP TO RESTART':'PRESS SPACE TO RESTART',W/2,H/2+85);
    }
  }

  function drawChangelog() {
    drawStarfield();
    ctx.shadowBlur=20; ctx.shadowColor='#00ffff'; ctx.fillStyle='#00ffff'; ctx.font='bold 28px monospace'; ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('CHANGELOG',W/2,20); ctx.shadowBlur=0; ctx.fillStyle='#444'; ctx.font='11px monospace'; ctx.fillText('Press C to go back',W/2,56);
    let y=90;
    for (const s of CHANGELOG_DATA) {
      ctx.shadowBlur=12; ctx.shadowColor=s.color; ctx.fillStyle=s.color; ctx.font='bold 18px monospace'; ctx.textAlign='left'; ctx.fillText('◆ '+s.version,30,y);
      ctx.shadowBlur=0; ctx.fillStyle='#555'; ctx.font='11px monospace'; ctx.textAlign='right'; ctx.fillText(s.date,W-30,y+3); y+=24;
      ctx.strokeStyle=s.color+'44'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(30,y); ctx.lineTo(W-30,y); ctx.stroke(); y+=10;
      ctx.font='12px monospace'; ctx.textAlign='left';
      for (const entry of s.entries) {
        if(y>H-20)break;
        ctx.fillStyle=entry.startsWith('+')?'#00ff88':'#ff8844'; ctx.fillText(entry,36,y); y+=17;
      }
      y+=12;
    }
  }

  // ── main loop ─────────────────────────────────────────────

  let lastTime = performance.now();

  function loop(ts) {
    let dt = (ts - lastTime) / 1000;
    if (dt > 0.05) dt = 0.05;
    if (dt < 0)    dt = 0;
    lastTime = ts;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  // ── init ──────────────────────────────────────────────────

  Input.bind(canvas, {
    onWeaponSelect: (idx) => { if (state===STATE.PLAYING) { weaponIdx=idx; cooldownTimer=0; } },
    onTogglePause:  ()    => { if (state===STATE.PLAYING) state=STATE.PAUSED; else if (state===STATE.PAUSED) state=STATE.PLAYING; },
    onStart:        ()    => { if (!NameInput.active && !showingLeaderboard && (state===STATE.START||state===STATE.GAMEOVER)) startGame(); },
    onChangelog:    ()    => { if (state===STATE.START||state===STATE.CHANGELOG) state = state===STATE.CHANGELOG?STATE.START:STATE.CHANGELOG; },
    onTouchIntercept: (e) => {
      // Only intercept touches when on the GAMEOVER screen
      if (state !== STATE.GAMEOVER) return false;
      const t = e.changedTouches[0];
      if (!t) return false;
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      const tx = (t.clientX - rect.left) * scaleX;
      const ty = (t.clientY - rect.top) * scaleY;

      // Check all game-over interactive buttons
      const buttons = [
        { btn: NameInput._submitBtn,      action: () => submitName() },
        { btn: NameInput._restartBtn,     action: () => startGame() },
        { btn: NameInput._leaderboardBtn, action: () => { showingLeaderboard = true; LeaderboardUI.fetchScores(); } },
        { btn: NameInput._backBtn,        action: () => { showingLeaderboard = false; } },
        { btn: NameInput._restartBtn2,    action: () => startGame() },
      ];

      for (const { btn, action } of buttons) {
        if (btn && tx >= btn.x && tx <= btn.x + btn.w && ty >= btn.y && ty <= btn.y + btn.h) {
          e.stopPropagation();
          action();
          return true; // cancel onStart
        }
      }

      // On game over screen but no button hit — if name entry active, focus input
      if (NameInput.active && !NameInput.submitted) {
        if (NameInput._el) NameInput._el.focus();
        return true; // cancel onStart so typing a name doesn't restart the game
      }

      return false; // let onStart proceed (e.g. tap to restart after submission, no button hit)
    },
  });

  canvas.addEventListener('click', e => {
    if (state === STATE.GAMEOVER && NameInput.active && !NameInput.submitted) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      const cx = (e.clientX - rect.left) * scaleX;
      const cy = (e.clientY - rect.top) * scaleY;
      const btn = NameInput._submitBtn;
      if (btn && cx >= btn.x && cx <= btn.x+btn.w && cy >= btn.y && cy <= btn.y+btn.h) {
        e.stopPropagation();
        submitName();
        return;
      }
    }
    if (state === STATE.GAMEOVER && NameInput.submitted && !showingLeaderboard) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      const cx = (e.clientX - rect.left) * scaleX;
      const cy = (e.clientY - rect.top) * scaleY;
      const rb = NameInput._restartBtn;
      const lb = NameInput._leaderboardBtn;
      if (rb && cx >= rb.x && cx <= rb.x+rb.w && cy >= rb.y && cy <= rb.y+rb.h) { e.stopPropagation(); startGame(); return; }
      if (lb && cx >= lb.x && cx <= lb.x+lb.w && cy >= lb.y && cy <= lb.y+lb.h) { e.stopPropagation(); showingLeaderboard = true; LeaderboardUI.fetchScores(); return; }
    }
    if (state === STATE.GAMEOVER && showingLeaderboard) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      const cx = (e.clientX - rect.left) * scaleX;
      const cy = (e.clientY - rect.top) * scaleY;
      const backBtn = NameInput._backBtn;
      const restartBtn2 = NameInput._restartBtn2;
      if (backBtn && cx >= backBtn.x && cx <= backBtn.x+backBtn.w && cy >= backBtn.y && cy <= backBtn.y+backBtn.h) { e.stopPropagation(); showingLeaderboard = false; return; }
      if (restartBtn2 && cx >= restartBtn2.x && cx <= restartBtn2.x+restartBtn2.w && cy >= restartBtn2.y && cy <= restartBtn2.y+restartBtn2.h) { e.stopPropagation(); startGame(); return; }
    }
  });

  // Leaderboard toggle handler
  document.addEventListener('keydown', e => {
    if (state !== STATE.GAMEOVER) return;
    if (e.code === 'KeyL' && NameInput.submitted && !showingLeaderboard) {
      showingLeaderboard = true;
      LeaderboardUI.fetchScores();
    } else if (e.code === 'Escape' && showingLeaderboard) {
      showingLeaderboard = false;
    }
  });

  function submitName() {
    if (!NameInput.active || NameInput.submitted) return;
    const name = NameInput.value.trim() || 'PILOT';
    localStorage.setItem('galaxyShooterName', name);
    NameInput.submitted = true;
    NameInput.active    = false;
    if (NameInput._el) NameInput._el.blur();
    NameInput.savedMsg  = 2.5;
    LeaderboardUI.submitScore(name, score, wave);
  }

  // Name-input keydown handler (registered after Input.bind so closure has score/wave)
  document.addEventListener('keydown', e => {
    if (!NameInput.active || NameInput.submitted) return;
    if (e.code === 'Enter') {
      e.stopImmediatePropagation();
      submitName();
      return;
    }
    if (e.code === 'Backspace') {
      NameInput.value = NameInput.value.slice(0, -1);
      e.stopImmediatePropagation();
      return;
    }
    if (/^[a-zA-Z0-9 ]$/.test(e.key) && NameInput.value.length < 12) {
      NameInput.value += e.key.toUpperCase();
      e.stopImmediatePropagation();
    }
  });

  requestAnimationFrame(loop);
})(); // closes Game IIFE

})(); // closes outer strict-mode IIFE
</script>
</body>
</html>
