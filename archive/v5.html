/<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Shooter V4</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
canvas { max-width: 100%; height: auto; display: block; }
#api-bar {
  position: fixed; top: 8px; right: 8px;
  display: flex; align-items: center; gap: 6px;
  font: 11px monospace; color: #555; z-index: 10;
}
#api-key-input {
  
  font: 11px monospace; padding: 3px 6px; width: 240px; border-radius: 3px;
}
#api-key-input:focus { outline: none; border-color: #ff00ff; color: #fff; }
#api-status { font: 10px monospace; color: #444; }
</style>
</head>
<body>
<div id="api-bar">
  <span>Anthropic key (optional):</span>
  <input id="api-key-input" type="password" placeholder="sk-ant-... for boss taunts" autocomplete="off">
  <span id="api-status"></span>
</div>
<canvas id="game" width="600" height="650"></canvas>
<input id="nameInput" type="text" maxlength="12" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
  style="position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;top:0;left:0;z-index:-1;" />
<script>
(function () {
'use strict';

// ============================================================
// CONFIG  — every magic number lives here
// ============================================================
const CFG = {
  W: 600, H: 650,
  FOV: 400,
  VP: { x: 300, y: 227 },   // vanishing point (W/2, H*0.35)

  player: {
    width: 24, height: 30,
    accel: 1800, friction: 10,
    maxSpeed: 300, boostSpeed: 450,
    invincibleDur: 2, shieldDur: 5, boostDur: 6,
  },

  combo: { window: 1.5, displayDur: 1.5, maxMult: 16 },
  chain: { radius: 80, maxDepth: 4, bonusPts: 50 },
  powerup: { dropRate: 0.12, spreadDur: 8 },

  // Boss phase HP thresholds
  bossPhases: { aggressive: 0.6, enraged: 0.3 },

  // Warp transition duration (seconds)
  warpDuration: 1.5,
};

// ============================================================
// DATA  — definitions for weapons, enemies, boss patterns
// ============================================================
const WeaponDefs = [
  { name: 'LASER',   color: '#00ffff', cooldown: 0,    continuous: true  },
  { name: 'SPREAD',  color: '#00ff88', cooldown: 250,  continuous: false },
  { name: 'HOMING',  color: '#ff4444', cooldown: 500,  continuous: false },
  { name: 'PLASMA',  color: '#ff00ff', cooldown: 1200, continuous: false },
  { name: 'RAILGUN', color: '#ffffff', cooldown: 2000, continuous: false },
];

const EnemyDefs = {
  A: { label: 'Scout',   baseSize: 14, color: '#ff4444', hp: 1, points: 10, speed: 0.18, sides: 4,  pattern: 'dive'      },
  B: { label: 'Fighter', baseSize: 18, color: '#ff8800', hp: 2, points: 20, speed: 0.14, sides: 6,  pattern: 'formation' },
  C: { label: 'Bomber',  baseSize: 24, color: '#ffcc00', hp: 3, points: 30, speed: 0.10, sides: 8,  pattern: 'spiral'    },
};

// Boss attack patterns — each knows when it's allowed (minPhase)
// and how to build bullet objects given (bossScreenX, bossScreenY, playerX, playerY, spiralOffset)
const BossPatternDefs = [
  {
    name: 'spiral', cooldown: 0.8, minPhase: 'patrol',
    shoot(bx, by, _px, _py, offset) {
      const n = 16;
      return Array.from({ length: n }, (_, i) => {
        const a = (Math.PI * 2 / n) * i + offset;
        return { x: bx, y: by, vx: Math.cos(a) * 180, vy: Math.sin(a) * 180, color: '#ff4444', radius: 4 };
      });
    },
  },
  {
    name: 'aimed', cooldown: 0.6, minPhase: 'aggressive',
    shoot(bx, by, px, py, _o) {
      const base = Math.atan2(py - by, px - bx);
      return [-20, -10, 0, 10, 20].map(deg => {
        const a = base + deg * Math.PI / 180;
        return { x: bx, y: by, vx: Math.cos(a) * 240, vy: Math.sin(a) * 240, color: '#ff8800', radius: 4 };
      });
    },
  },
  {
    name: 'ring', cooldown: 1.2, minPhase: 'aggressive',
    shoot(bx, by, _px, _py, _o, hpPct) {
      const n = 12;
      const ring = (offset) => Array.from({ length: n }, (_, i) => {
        const a = (Math.PI * 2 / n) * i + offset;
        return { x: bx, y: by, vx: Math.cos(a) * 210, vy: Math.sin(a) * 210, color: '#ffcc00', radius: 4 };
      });
      return hpPct < 0.4 ? [...ring(0), ...ring(Math.PI / n)] : ring(0);
    },
  },
  {
    name: '3dring', cooldown: 1.5, minPhase: 'enraged',
    shoot(bx, by, _px, _py, _o) {
      const n = 20;
      return Array.from({ length: n }, (_, i) => {
        const a = (Math.PI * 2 / n) * i;
        return { x: bx, y: by, vx: Math.cos(a) * 140, vy: Math.sin(a) * 70 + 90, color: '#ff00ff', radius: 5 };
      });
    },
  },
];

const PHASE_ORDER = ['patrol', 'aggressive', 'enraged'];

// ============================================================
// AUDIO  — Web Audio API, fully procedural
// ============================================================
const Audio = (function () {
  let ctx = null;
  let drone = null;

  function init() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
  }

  function osc(type, freq, gainVal, duration, now) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, now);
    g.gain.setValueAtTime(gainVal, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + duration);
    o.connect(g).connect(ctx.destination);
    o.start(now); o.stop(now + duration);
    return { osc: o, gain: g };
  }

  function ramp(oscNode, toFreq, duration, now) {
    oscNode.frequency.exponentialRampToValueAtTime(toFreq, now + duration);
  }

  function play(type, pm) {
    if (!ctx || ctx.state !== 'running') return;
    pm = pm || 1;
    const now = ctx.currentTime;
    try {
      switch (type) {
        case 'shoot': { const o = osc('square', 880*pm, 0.08, 0.1, now); ramp(o.osc, 1300*pm, 0.05, now); break; }
        case 'spread': {
          const o1 = osc('square',   660*pm, 0.06, 0.12, now);
          const o2 = osc('triangle', 990*pm, 0.06, 0.12, now);
          ramp(o1.osc, 1100*pm, 0.06, now); ramp(o2.osc, 1400*pm, 0.06, now);
          break;
        }
        case 'missile': { const o = osc('sawtooth', 200*pm, 0.07, 0.2, now); ramp(o.osc, 600*pm, 0.15, now); break; }
        case 'plasma':  { const o = osc('sine', 80, 0.12, 0.3, now); ramp(o.osc, 40, 0.3, now); break; }
        case 'plasmaExplode': {
          const o1 = osc('sine',     120, 0.15, 0.4, now);
          const o2 = osc('sawtooth', 300, 0.15, 0.4, now);
          ramp(o1.osc, 30, 0.4, now); ramp(o2.osc, 50, 0.4, now);
          break;
        }
        case 'railgun': {
          const o1 = osc('sawtooth', 2000, 0.10, 0.2, now);
          const o2 = osc('square',   3000, 0.10, 0.2, now);
          ramp(o1.osc, 100, 0.15, now); ramp(o2.osc, 80, 0.15, now);
          break;
        }
        case 'laserHum':   { osc('sine', 220*pm, 0.03, 0.07, now); break; }
        case 'enemyDeath': { const o = osc('sine', 400*pm, 0.12, 0.2, now); ramp(o.osc, 150*pm, 0.2, now); break; }
        case 'chainKill':  { const o = osc('sine', 600*pm, 0.10, 0.12, now); ramp(o.osc, 250*pm, 0.12, now); break; }
        case 'playerHit':  { osc('sawtooth', 150, 0.15, 0.3, now); break; }
        case 'bossHit':    { const o = osc('sine', 220, 0.10, 0.15, now); ramp(o.osc, 100, 0.15, now); break; }
        case 'powerup': {
          [523, 659, 784, 1047].forEach((freq, i) => {
            const t = now + i * 0.08;
            const o2 = ctx.createOscillator();
            const g2 = ctx.createGain();
            o2.type = 'sine'; o2.frequency.setValueAtTime(freq, t);
            g2.gain.setValueAtTime(0, t);
            g2.gain.linearRampToValueAtTime(0.1, t + 0.02);
            g2.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
            o2.connect(g2).connect(ctx.destination);
            o2.start(t); o2.stop(t + 0.12);
          });
          break;
        }
        case 'warp': {
          const o = osc('sawtooth', 80, 0.08, 1.5, now);
          o.osc.frequency.exponentialRampToValueAtTime(400, now + 0.8);
          o.osc.frequency.exponentialRampToValueAtTime(60, now + 1.5);
          o.gain.gain.linearRampToValueAtTime(0.12, now + 0.5);
          break;
        }
      }
    } catch (_) {}
  }

  function startDrone() {
    if (!ctx || drone) return;
    try {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(55, ctx.currentTime);
      g.gain.setValueAtTime(0.04, ctx.currentTime);
      o.connect(g).connect(ctx.destination);
      o.start();
      drone = { osc: o, gain: g };
    } catch (_) {}
  }

  function stopDrone() {
    if (!drone) return;
    try { drone.osc.stop(); } catch (_) {}
    drone = null;
  }

  return { init, play, startDrone, stopDrone };
})();

// ============================================================
// INPUT  — keyboard + touch, returns clean intent each frame
// ============================================================
const Input = (function () {
  const keys = {};
  const isTouchDevice = 'ontouchstart' in window;
  let joystick = { active: false, id: -1, value: 0 };
  let fire     = { active: false, id: -1 };
  let onWeaponSelect    = null;  // callback set by Game
  let onTogglePause     = null;
  let onStart           = null;
  let onChangelog       = null;
  let onTouchIntercept  = null;

  const joystickPos   = { x: 80, y: CFG.H - 80 };
  const fireButtonPos = { x: CFG.W - 80, y: CFG.H - 80 };
  const JOYSTICK_R    = 60;
  const FIRE_R        = 50;
  const WEAPON_BTN_R  = 18;
  const WEAPON_BTN_Y  = CFG.H - 155;
  const WEAPON_BTN_X0 = CFG.W - 175;
  const WEAPON_BTN_DX = 36;

  function canvasPos(canvas, touch) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (touch.clientX - rect.left) * (CFG.W / rect.width),
      y: (touch.clientY - rect.top)  * (CFG.H / rect.height),
    };
  }

  function bindKeyboard() {
    document.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Space') e.preventDefault();
      if (e.code === 'KeyP' && onTogglePause) onTogglePause();
      if (e.code === 'Space' && onStart)      { Audio.init(); onStart(); }
      if (e.code === 'KeyC' && onChangelog)   onChangelog();
      if (onWeaponSelect) {
        const idx = ['Digit1','Digit2','Digit3','Digit4','Digit5'].indexOf(e.code);
        if (idx >= 0) onWeaponSelect(idx);
      }
    });
    document.addEventListener('keyup', e => { keys[e.code] = false; });
    document.addEventListener('click', () => { Audio.init(); if (onStart) onStart(); });
  }

  function bindTouch(canvas) {
    function onStart_(e) {
      e.preventDefault();
      Audio.init();
      // Let game intercept this touch before firing onStart
      if (onTouchIntercept && onTouchIntercept(e)) return;
      if (onStart) onStart();
      for (let i = 0; i < e.changedTouches.length; i++) {
        const pos = canvasPos(canvas, e.changedTouches[i]);
        // Weapon buttons
        for (let w = 0; w < 5; w++) {
          const bx = WEAPON_BTN_X0 + w * WEAPON_BTN_DX;
          if (Math.hypot(pos.x - bx, pos.y - WEAPON_BTN_Y) < WEAPON_BTN_R + 8) {
            if (onWeaponSelect) onWeaponSelect(w);
            break;
          }
        }
        // Joystick
        if (Math.hypot(pos.x - joystickPos.x, pos.y - joystickPos.y) < JOYSTICK_R + 30) {
          joystick.active = true; joystick.id = e.changedTouches[i].identifier;
          joystick.value = Math.max(-1, Math.min(1, (pos.x - joystickPos.x) / JOYSTICK_R));
        } else if (Math.hypot(pos.x - fireButtonPos.x, pos.y - fireButtonPos.y) < FIRE_R + 30) {
          fire.active = true; fire.id = e.changedTouches[i].identifier;
        }
      }
    }
    function onMove(e) {
      e.preventDefault();
      for (let i = 0; i < e.changedTouches.length; i++) {
        if (joystick.active && e.changedTouches[i].identifier === joystick.id) {
          const pos = canvasPos(canvas, e.changedTouches[i]);
          joystick.value = Math.max(-1, Math.min(1, (pos.x - joystickPos.x) / JOYSTICK_R));
        }
      }
    }
    function onEnd(e) {
      e.preventDefault();
      for (let i = 0; i < e.changedTouches.length; i++) {
        if (joystick.active && e.changedTouches[i].identifier === joystick.id) { joystick.active = false; joystick.value = 0; }
        if (fire.active   && e.changedTouches[i].identifier === fire.id)       { fire.active = false; }
      }
    }
    canvas.addEventListener('touchstart',  onStart_, { passive: false });
    canvas.addEventListener('touchmove',   onMove,   { passive: false });
    canvas.addEventListener('touchend',    onEnd,    { passive: false });
    canvas.addEventListener('touchcancel', onEnd,    { passive: false });
  }

  return {
    isTouchDevice,
    joystickPos, fireButtonPos, JOYSTICK_R, FIRE_R,
    WEAPON_BTN_R, WEAPON_BTN_Y, WEAPON_BTN_X0, WEAPON_BTN_DX,
    bind(canvas, callbacks) {
      onWeaponSelect   = callbacks.onWeaponSelect;
      onTogglePause    = callbacks.onTogglePause;
      onStart          = callbacks.onStart;
      onChangelog      = callbacks.onChangelog;
      onTouchIntercept = callbacks.onTouchIntercept || null;
      bindKeyboard();
      bindTouch(canvas);
    },
    moveAxis()  { if (isTouchDevice && joystick.active) return joystick.value; if (keys['ArrowLeft'] || keys['KeyA']) return -1; if (keys['ArrowRight'] || keys['KeyD']) return 1; return 0; },
    wantShoot() { return keys['Space'] || (isTouchDevice && fire.active); },
    getJoystick() { return joystick; },
    getFire()     { return fire; },
  };
})();

// ============================================================
// FX  — particles, shockwaves, score popups, screen shake
// ============================================================
const FX = (function () {
  let particles   = [];
  let shockwaves  = [];
  let scorePopups = [];
  let chainTexts  = [];
  let engineTrail = [];
  let missileTrails = [];
  let shake = { x: 0, y: 0, intensity: 0, duration: 0 };
  let flashAlpha = 0;

  return {
    reset() {
      particles = []; shockwaves = []; scorePopups = []; chainTexts = [];
      engineTrail = []; missileTrails = [];
      shake = { x: 0, y: 0, intensity: 0, duration: 0 };
      flashAlpha = 0;
    },
    triggerShake(intensity, durationMs) {
      shake.intensity = Math.max(shake.intensity, intensity);
      shake.duration  = Math.max(shake.duration, durationMs);
    },
    flash(alpha) { flashAlpha = Math.max(flashAlpha, alpha); },
    spawnParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2, s = Math.random() * 200 + 50;
        particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, decay: Math.random()*2+1.5, color, size: Math.random()*3+1 });
      }
    },
    spawnShockwave(x, y, maxR) { shockwaves.push({ x, y, radius: 0, maxRadius: maxR||80, life: 0.3, maxLife: 0.3 }); },
    spawnScorePopup(x, y, pts, color) { scorePopups.push({ x, y, text: '+'+pts, color, life: 0.8, maxLife: 0.8 }); },
    spawnChainText(x, y, n) { chainTexts.push({ x, y, text: 'CHAIN x'+n+'!', life: 1.0, maxLife: 1.0 }); },
    spawnEngineTrail(x, y) {
      for (let i = 0; i < 2; i++) {
        engineTrail.push({ x: x+(Math.random()-0.5)*6, y, vx: (Math.random()-0.5)*20, vy: 30+Math.random()*20, life: 0.3, maxLife: 0.3, size: 3, maxSize: 3, color: Math.random()>0.5?'#00ffff':'#4488ff' });
      }
    },
    spawnMissileTrail(x, y) {
      missileTrails.push({ x, y, vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20, life: 1, color: '#ff6600' });
    },
    update(dt) {
      if (shake.duration > 0) {
        shake.duration -= dt * 1000;
        shake.x = (Math.random()-0.5) * shake.intensity * 2;
        shake.y = (Math.random()-0.5) * shake.intensity * 2;
        if (shake.duration <= 0) { shake.x = 0; shake.y = 0; shake.intensity = 0; }
      }
      if (flashAlpha > 0) { flashAlpha -= dt * 3; if (flashAlpha < 0) flashAlpha = 0; }
      particles     = particles.filter(p  => { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=100*dt; p.life-=p.decay*dt; return p.life>0; });
      engineTrail   = engineTrail.filter(p => { p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; p.size=p.maxSize*(p.life/p.maxLife); return p.life>0; });
      scorePopups   = scorePopups.filter(p => { p.life-=dt; p.y-=50*dt; return p.life>0; });
      shockwaves    = shockwaves.filter(s  => { s.life-=dt; s.radius=s.maxRadius*(1-s.life/s.maxLife); return s.life>0; });
      chainTexts    = chainTexts.filter(c  => { c.life-=dt; c.y-=30*dt; return c.life>0; });
      missileTrails = missileTrails.filter(p => { p.life-=dt*4; p.x+=p.vx*dt; p.y+=p.vy*dt; return p.life>0; });
    },
    // Expose raw arrays for Renderer
    get particles()    { return particles; },
    get shockwaves()   { return shockwaves; },
    get scorePopups()  { return scorePopups; },
    get chainTexts()   { return chainTexts; },
    get engineTrail()  { return engineTrail; },
    get missileTrails(){ return missileTrails; },
    get shake()        { return shake; },
    get flashAlpha()   { return flashAlpha; },
  };
})();

// ============================================================
// MOVEMENT PATTERNS  — pure functions that mutate enemy position
// ============================================================
const MovementPatterns = {
  dive(e, dt) {
    if (e.z < 0.2) e.x3d += (Math.sin(e.phase * 3) > 0 ? 1 : -1) * 150 * dt;
  },
  spiral(e, _dt) {
    e.x3d = e.startX3d + Math.sin(e.z * 10) * e.amplitude;
  },
  formation(e, dt) {
    e.x3d = e.startX3d + Math.sin(e.phase) * e.amplitude * 0.5;
  },
};

// ============================================================
// BOSS AI  — finite state machine, self-contained
// ============================================================
class BossAI {
  constructor(wave) {
    const hp = 30 + wave * 5;
    this.x3d    = 0;
    this.y3d    = 50;
    this.z      = 0.8;
    this.targetZ = 0.3;
    this.hp     = hp;
    this.maxHp  = hp;
    this.baseSize = 60;
    this.vx     = 1.5;
    this.phase  = 0;           // animation phase (radians)
    this.entered = false;

    // Pattern rotation
    this.patternTimer   = 0;
    this.patternIndex   = 0;   // index into current phase's pattern list
    this.shootTimers    = BossPatternDefs.map(() => 0);
    this.spiralOffset   = 0;
  }

  get hpPct()  { return this.hp / this.maxHp; }
  get phaseName() {
    if (this.hpPct <= CFG.bossPhases.enraged)    return 'enraged';
    if (this.hpPct <= CFG.bossPhases.aggressive) return 'aggressive';
    return 'patrol';
  }

  // Returns list of allowed patterns for current phase
  _allowedPatterns() {
    const rank = PHASE_ORDER.indexOf(this.phaseName);
    return BossPatternDefs.filter(p => PHASE_ORDER.indexOf(p.minPhase) <= rank);
  }

  update(dt) {
    this.phase += dt * 3;
    if (!this.entered) {
      this.z -= 0.15 * dt;
      if (this.z <= this.targetZ) { this.z = this.targetZ; this.entered = true; }
      return;
    }

    const sf = { patrol: 1, aggressive: 1.8, enraged: 2.8 }[this.phaseName];
    this.x3d += this.vx * sf * 100 * dt;
    if (this.x3d < -200) { this.x3d = -200; this.vx = Math.abs(this.vx); }
    if (this.x3d >  200) { this.x3d =  200; this.vx = -Math.abs(this.vx); }

    this.patternTimer += dt;
    const allowed = this._allowedPatterns();
    if (this.patternTimer >= 4) {
      this.patternTimer = 0;
      this.patternIndex = (this.patternIndex + 1) % allowed.length;
    }
    // Tick shoot timers
    for (let i = 0; i < BossPatternDefs.length; i++) this.shootTimers[i] += dt;
    this.spiralOffset += 15 * Math.PI / 180 * dt * 60 * dt;
  }

  // Returns array of bullet objects to add this frame, or []
  tryShoot(bx, by, px, py) {
    if (!this.entered) return [];
    const allowed = this._allowedPatterns();
    const pat = allowed[this.patternIndex % allowed.length];
    const globalIdx = BossPatternDefs.indexOf(pat);
    if (this.shootTimers[globalIdx] < pat.cooldown) return [];
    this.shootTimers[globalIdx] = 0;
    return pat.shoot(bx, by, px, py, this.spiralOffset, this.hpPct);
  }
}

// ============================================================
// LEADERBOARD UI  — API calls + canvas drawing
// ============================================================
const LeaderboardUI = (function () {
  const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:3000/api/scores'
    : window.location.origin + '/api/scores';
  let scores = [];   // cached top scores from last fetch

  async function fetchScores() {
    try {
      const res = await fetch(API, { signal: AbortSignal.timeout(3000) });
      if (!res.ok) return;
      const data = await res.json();
      if (Array.isArray(data.scores)) scores = data.scores.slice(0, 10);
    } catch (_) { /* silently skip */ }
  }

  async function submitScore(name, score, wave) {
    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, score, wave }),
        signal: AbortSignal.timeout(4000),
      });
      if (res.ok) await fetchScores();
    } catch (_) { /* silently skip */ }
  }

  function drawLeaderboard(ctx, x, y) {
    if (!scores.length) return;
    const W = 600;
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.font = 'bold 14px monospace';
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#00ffff';
    ctx.fillStyle = '#00ffff';
    ctx.fillText('TOP PILOTS', x, y);
    ctx.shadowBlur = 0;
    y += 22;
    scores.forEach((entry, i) => {
      const bright = i % 2 === 0 ? '#dddddd' : '#999999';
      ctx.fillStyle = bright;
      ctx.font = '12px monospace';
      const rank  = String(i + 1).padStart(2, ' ');
      const name  = (entry.name || '???').slice(0, 12).padEnd(12, ' ');
      const score = String(entry.score || 0).padStart(7, ' ');
      const wave  = 'W' + String(entry.wave || 1).padStart(2, '0');
      ctx.fillText(`${rank}. ${name} ${score}  ${wave}`, x, y + i * 17);
    });
    ctx.restore();
  }

  // Kick off initial fetch immediately
  fetchScores();

  return { fetchScores, submitScore, drawLeaderboard };
})();

// NARRATOR AI  — Claude API for boss taunts (optional)
// ============================================================
const NarratorAI = (function () {
  let apiKey = '';
  let busy   = false;
  let lastMessage = '';
  let displayTimer = 0;
  const statusEl = document.getElementById('api-status');
  const keyInput  = document.getElementById('api-key-input');

  keyInput.addEventListener('change', () => {
    apiKey = keyInput.value.trim();
    statusEl.textContent = apiKey ? '✓ key set' : '';
  });

  // Fallback taunts used when no key is present or fetch fails
  const fallbackTaunts = [
    "You dare challenge ME?",
    "Pathetic insects!",
    "Your weapons are futile!",
    "I cannot be destroyed!",
    "FEEL MY POWER!",
    "Is that all you have?",
    "Tremble before your doom!",
  ];

  async function fetchTaunt(hpPct, wave, playerScore) {
    if (!apiKey || busy) return null;
    busy = true;
    statusEl.textContent = '...';
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 40,
          system: 'You are an evil space boss in an arcade game. Reply with ONE short dramatic taunt (under 8 words). No quotes. No explanation.',
          messages: [{
            role: 'user',
            content: `HP: ${Math.round(hpPct*100)}%, wave ${wave}, player score ${playerScore}. Give one taunt.`,
          }],
        }),
      });
      const data = await res.json();
      statusEl.textContent = '✓';
      return data.content?.[0]?.text?.trim() || null;
    } catch (_) {
      statusEl.textContent = 'err';
      return null;
    } finally {
      busy = false;
    }
  }

  function fallback() {
    return fallbackTaunts[Math.floor(Math.random() * fallbackTaunts.length)];
  }

  return {
    async trigger(hpPct, wave, score) {
      const msg = (await fetchTaunt(hpPct, wave, score)) || fallback();
      lastMessage  = msg;
      displayTimer = 3.0;
    },
    update(dt) { if (displayTimer > 0) displayTimer -= dt; },
    get message()  { return displayTimer > 0 ? lastMessage : ''; },
    get isVisible(){ return displayTimer > 0; },
  };
})();

// ============================================================
// 3D PROJECTION
// ============================================================
function project(x3d, y3d, z) {
  const scale = CFG.FOV / (CFG.FOV + z * 600);
  return { sx: CFG.VP.x + x3d * scale, sy: CFG.VP.y + y3d * scale, scale };
}

// ============================================================
// WEAPON SYSTEM  — pure firing logic, returns new game objects
// ============================================================
const WeaponSystem = {
  fireLaser(player, enemies, boss, dt) {
    const W = 15;
    const dead = [];
    enemies.forEach(e => {
      if (e._dead) return;
      const ep = screenPos(e);
      if (Math.abs(ep.x - player.x) < W + ep.size && ep.y < player.y) {
        e.hp -= 3 * dt;
        if (e.hp <= 0) { e._dead = true; dead.push(ep); }
      }
    });
    let bossHit = false;
    if (boss && boss.entered) {
      const bp = project(boss.x3d, boss.y3d, boss.z);
      if (Math.abs(bp.sx - player.x) < W + boss.baseSize * bp.scale && bp.sy < player.y) {
        boss.hp -= 2 * dt; bossHit = true;
      }
    }
    return { dead, bossHit };
  },

  fireSpread(player) {
    return [-30,-15,0,15,30].map(deg => {
      const r = deg * Math.PI / 180;
      return { x: player.x, y: player.y-20, vx: Math.sin(r)*480, vy: -Math.cos(r)*480, color: '#00ff88', radius: 4, damage: 1 };
    });
  },

  fireHoming(player) {
    return [0, 1].map(i => ({
      x: player.x + (i===0?-12:12), y: player.y-15,
      speed: 360, angle: -Math.PI/2 + (i===0?-0.2:0.2),
      damage: 1, life: 3,
    }));
  },

  firePlasma(player) {
    return [{ x: player.x, y: player.y-20, vy: -180, radius: 18, pulsePhase: 0 }];
  },

  fireRailgun(player, enemies, boss) {
    const col = 8;
    const dead = [];
    let bossHit = false;
    enemies.forEach(e => {
      if (e._dead) return;
      const ep = screenPos(e);
      if (Math.abs(ep.x - player.x) < col + ep.size) { e.hp = 0; e._dead = true; dead.push(ep); }
    });
    if (boss && boss.entered) {
      const bp = project(boss.x3d, boss.y3d, boss.z);
      if (Math.abs(bp.sx - player.x) < col + boss.baseSize * bp.scale) { boss.hp -= 5; bossHit = true; }
    }
    return { dead, bossHit, x: player.x };
  },
};

function screenPos(e) {
  const p = project(e.x3d, e.y3d, e.z);
  return { x: p.sx, y: p.sy, scale: p.scale, size: e.baseSize * p.scale };
}
