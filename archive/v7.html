  function drawUpgradeScreen() {
    // Phase 1 (game-architect): responsive layout — vertical stack on narrow/portrait,
    // horizontal row on wide screens.  All magic numbers read from CFG.upgradeCard.
    // Phase 2 (gameplay-engineer): _btnRects populated here; touch intercept reads them.
    ctx.fillStyle='rgba(0,0,0,0.88)'; ctx.fillRect(0,0,W,H);
    drawStarfield();
    ctx.save();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowBlur=30; ctx.shadowColor='#ffcc00'; ctx.fillStyle='#ffcc00';
    ctx.font='bold 32px monospace';
    ctx.fillText('CHOOSE UPGRADE', W/2, 60); ctx.shadowBlur=0;

    // Responsive hint: "TAP A CARD" on touch devices, keyboard hint on desktop
    ctx.fillStyle='#888'; ctx.font='13px monospace';
    ctx.fillText(Input.isTouchDevice ? 'TAP A CARD' : 'PRESS 1 / 2 / 3  or  click a card', W/2, 90);

    const cards = UpgradeSystem.cards;
    const uc = CFG.upgradeCard;
    // Phase 2: detect narrow/portrait canvas
    const narrow = W < uc.narrowBreakpoint;

    UpgradeSystem._btnRects = [];

    if (narrow) {
      // ── Vertical stack layout ──────────────────────────────
      const cw = Math.min(uc.tallW, W - 40);
      const ch = uc.tallH;
      const gap = uc.tallGap;
      const totalH = cards.length * ch + (cards.length - 1) * gap;
      // Centre vertically, but never above tallStartY
      const startY = Math.max(uc.tallStartY, H/2 - totalH/2);
      const cx = W / 2;

      cards.forEach((card, i) => {
        const x = cx - cw/2;
        const y = startY + i * (ch + gap);
        UpgradeSystem._btnRects.push({ x, y, w: cw, h: ch });
        const hover = UpgradeSystem.selectedCard === i;
        ctx.shadowBlur = hover ? 30 : 10; ctx.shadowColor = card.color;
        ctx.strokeStyle = card.color; ctx.lineWidth = hover ? 3 : 1.5;
        ctx.fillStyle = `rgba(0,0,0,${hover ? 0.6 : 0.4})`;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(x, y, cw, ch, 10); else ctx.rect(x, y, cw, ch);
        ctx.fill(); ctx.stroke(); ctx.shadowBlur = 0;

        // Number badge — left side
        ctx.fillStyle = card.color; ctx.font = `bold ${uc.numFontSize}px monospace`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(String(i + 1), x + 28, y + ch/2);

        // Label — centred in remaining space
        ctx.fillStyle = '#ffffff'; ctx.font = `bold ${uc.labelFontSize}px monospace`;
        ctx.fillText(card.label, cx + 10, y + ch/2 - 12);

        // Desc — single line, smaller font, below label
        ctx.fillStyle = '#aaa'; ctx.font = `${uc.descFontSize}px monospace`;
        ctx.fillText(card.desc, cx + 10, y + ch/2 + 12);

        ctx.textAlign = 'center';
      });
    } else {
      // ── Horizontal row layout ──────────────────────────────
      const cw = uc.wideW, ch = uc.wideH, gap = uc.wideGap;
      const totalW = cards.length * cw + (cards.length - 1) * gap;
      const startX = (W - totalW) / 2;

      cards.forEach((card, i) => {
        const x = startX + i * (cw + gap), y = H/2 - ch/2 - 20;
        UpgradeSystem._btnRects.push({ x, y, w: cw, h: ch });
        const hover = UpgradeSystem.selectedCard === i;
        ctx.shadowBlur = hover ? 30 : 10; ctx.shadowColor = card.color;
        ctx.strokeStyle = card.color; ctx.lineWidth = hover ? 3 : 1.5;
        ctx.fillStyle = `rgba(0,0,0,${hover ? 0.6 : 0.4})`;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(x, y, cw, ch, 10); else ctx.rect(x, y, cw, ch);
        ctx.fill(); ctx.stroke(); ctx.shadowBlur = 0;

        // Number badge
        ctx.fillStyle = card.color; ctx.font = `bold ${uc.numFontSize}px monospace`;
        ctx.fillText(String(i + 1), x + cw/2, y + 22);
        // Label
        ctx.fillStyle = '#ffffff'; ctx.font = `bold ${uc.labelFontSize}px monospace`;
        ctx.fillText(card.label, x + cw/2, y + 50);
        // Desc — word-wrap
        ctx.fillStyle = '#aaa'; ctx.font = `${uc.descFontSize}px monospace`;
        const words = card.desc.split(' ');
        let line = '', ly = y + 72;
        words.forEach(w => {
          const test = line + (line ? ' ' : '') + w;
          if (ctx.measureText(test).width > cw - 12) { ctx.fillText(line, x + cw/2, ly); ly += 16; line = w; }
          else line = test;
        });
        if (line) ctx.fillText(line, x + cw/2, ly);
      });
    }

    // Already chosen upgrades
    if (UpgradeSystem.chosen.length > 0) {
      ctx.fillStyle='#444'; ctx.font='11px monospace'; ctx.textAlign='center';
      ctx.fillText('ACTIVE: '+UpgradeSystem.chosen.map(id=>CFG.upgradeDefs.find(d=>d.id===id)?.label||id).join(' | '), W/2, H-40);
    }
    ctx.restore();
  }

      ctx.fillStyle = '#333';
      ctx.beginPath();
      if (ctx.roundRect) { ctx.roundRect(backBtn.x, backBtn.y, backBtn.w, backBtn.h, 6); } else { ctx.rect(backBtn.x, backBtn.y, backBtn.w, backBtn.h); }
      ctx.fill();
      ctx.fillStyle='#aaa'; ctx.font='13px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('<- BACK', W/2-65, H-38);
      NameInput._backBtn = backBtn;
      // RESTART button
      const restartBtn2 = { x: W/2+15, y: H-52, w: 100, h: 28 };
      ctx.fillStyle = blink2 ? '#00ff88' : '#009944';
      ctx.beginPath();
      if (ctx.roundRect) { ctx.roundRect(restartBtn2.x, restartBtn2.y, restartBtn2.w, restartBtn2.h, 6); } else { ctx.rect(restartBtn2.x, restartBtn2.y, restartBtn2.w, restartBtn2.h); }
      ctx.fill();
      ctx.fillStyle='#000'; ctx.font='bold 13px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('> RESTART', W/2+65, H-38);
      NameInput._restartBtn2 = restartBtn2;
      ctx.restore();
      return;
    }

    // Normal game over screen
    ctx.shadowBlur=25; ctx.shadowColor='#ff4444'; ctx.fillStyle='#ff4444'; ctx.font='bold 46px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('GAME OVER',W/2,H/2-120); ctx.shadowBlur=0;
    ctx.fillStyle='#ffffff'; ctx.font='22px monospace'; ctx.fillText('SCORE: '+score,W/2,H/2-70);
    ctx.fillStyle='#ffcc00'; ctx.fillText('HI-SCORE: '+hiScore,W/2,H/2-40);

    // Name entry / submission UI
    ctx.save();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    if (!NameInput.submitted) {
      ctx.font='14px monospace'; ctx.fillStyle='#aaa';
      ctx.fillText('ENTER YOUR NAME:', W/2, H/2+5);
      ctx.strokeStyle='#FFD700'; ctx.lineWidth=1.5;
      ctx.strokeRect(W/2-85, H/2+15, 170, 26);
      ctx.fillStyle='rgba(255,215,0,0.08)'; ctx.fillRect(W/2-85, H/2+15, 170, 26);
      const cursor = Math.floor(NameInput.cursorTimer*2)%2===0 ? '|' : '';
      ctx.fillStyle='#FFD700'; ctx.font='bold 15px monospace';
      ctx.fillText((NameInput.value||'') + cursor, W/2, H/2+28);
      // SUBMIT button (shown when name has been typed)
      if (NameInput.value.length > 0) {
        const bx = W/2-50, by = H/2+55, bw = 100, bh = 28;
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        if (ctx.roundRect) { ctx.roundRect(bx, by, bw, bh, 6); } else { ctx.rect(bx, by, bw, bh); }
        ctx.fill();
        ctx.fillStyle = '#111';
        ctx.font = 'bold 13px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('SUBMIT', W/2, by + bh/2);
        // Store button bounds for hit testing
        NameInput._submitBtn = { x: bx, y: by, w: bw, h: bh };
      } else {
        NameInput._submitBtn = null;
        // hint text
        ctx.font='11px monospace'; ctx.fillStyle='#555'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(Input.isTouchDevice ? 'tap here to type your name' : 'type your name, then ENTER', W/2, H/2+52);
      }
    } else {
      if (NameInput.savedMsg > 0) {
        ctx.shadowBlur=12; ctx.shadowColor='#00ff88';
        ctx.font='bold 15px monospace'; ctx.fillStyle='#00ff88'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('SCORE SUBMITTED!', W/2, H/2+10);
        ctx.shadowBlur=0;
      }
      // Draw two action buttons
      const blink = Math.floor(performance.now()/600)%2===0;
      // RESTART button (green)
      const rb = { x: W/2-115, y: H/2+50, w: 105, h: 34 };
      ctx.fillStyle = blink ? '#00ff88' : '#009944';
      ctx.beginPath();
      if (ctx.roundRect) { ctx.roundRect(rb.x, rb.y, rb.w, rb.h, 8); } else { ctx.rect(rb.x, rb.y, rb.w, rb.h); }
      ctx.fill();
      ctx.fillStyle = '#000'; ctx.font = 'bold 13px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('> RESTART', rb.x + rb.w/2, rb.y + rb.h/2);
      // LEADERBOARD button (cyan)
      const lb = { x: W/2+10, y: H/2+50, w: 105, h: 34 };
      ctx.fillStyle = blink ? '#00ccff' : '#006688';
      ctx.beginPath();
      if (ctx.roundRect) { ctx.roundRect(lb.x, lb.y, lb.w, lb.h, 8); } else { ctx.rect(lb.x, lb.y, lb.w, lb.h); }
      ctx.fill();
      ctx.fillStyle = '#000'; ctx.font = 'bold 12px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('SCORES', lb.x + lb.w/2, lb.y + lb.h/2);
      // Store for hit testing
      NameInput._restartBtn = rb;
      NameInput._leaderboardBtn = lb;
    }
    ctx.restore();

    if (!NameInput.submitted && !NameInput.active && Math.floor(performance.now()/600)%2===0) {
      ctx.fillStyle='#00ff88'; ctx.font='16px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(Input.isTouchDevice?'TAP TO RESTART':'PRESS SPACE TO RESTART',W/2,H/2+85);
    }
  }

  function drawChangelog() {
    drawStarfield();
    ctx.shadowBlur=20; ctx.shadowColor='#00ffff'; ctx.fillStyle='#00ffff'; ctx.font='bold 28px monospace'; ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('CHANGELOG',W/2,20); ctx.shadowBlur=0; ctx.fillStyle='#444'; ctx.font='11px monospace'; ctx.fillText('Press C to go back',W/2,56);
    let y=90;
    for (const s of CHANGELOG_DATA) {
      ctx.shadowBlur=12; ctx.shadowColor=s.color; ctx.fillStyle=s.color; ctx.font='bold 18px monospace'; ctx.textAlign='left'; ctx.fillText('◆ '+s.version,30,y);
      ctx.shadowBlur=0; ctx.fillStyle='#555'; ctx.font='11px monospace'; ctx.textAlign='right'; ctx.fillText(s.date,W-30,y+3); y+=24;
      ctx.strokeStyle=s.color+'44'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(30,y); ctx.lineTo(W-30,y); ctx.stroke(); y+=10;
      ctx.font='12px monospace'; ctx.textAlign='left';
      for (const entry of s.entries) {
        if(y>H-20)break;
        ctx.fillStyle=entry.startsWith('+')?'#00ff88':'#ff8844'; ctx.fillText(entry,36,y); y+=17;
      }
      y+=12;
    }
  }

  // ── main loop ─────────────────────────────────────────────

  let lastTime = performance.now();

  function loop(ts) {
    let dt = (ts - lastTime) / 1000;
    if (dt > 0.05) dt = 0.05;
    if (dt < 0)    dt = 0;
    lastTime = ts;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  // ── init ──────────────────────────────────────────────────

  Input.bind(canvas, {
    onWeaponSelect: (idx) => { if (state===STATE.PLAYING) { weaponIdx=idx; cooldownTimer=0; } },
    onTogglePause:  ()    => { if (state===STATE.PLAYING) state=STATE.PAUSED; else if (state===STATE.PAUSED) state=STATE.PLAYING; },
    onStart:        ()    => {
      if (state === STATE.START) {
        startGame();
      } else if (!NameInput.active && !showingLeaderboard && state===STATE.GAMEOVER) {
        startGame();
      }
    },
    onChangelog:    ()    => { if (state===STATE.START||state===STATE.CHANGELOG) state = state===STATE.CHANGELOG?STATE.START:STATE.CHANGELOG; },
    onTouchIntercept: (e) => {
      // Phase 2 (gameplay-engineer): intercept touches for UPGRADE and START screens
      // in addition to the existing GAMEOVER handling.  Returns true = cancel onStart,
      // false = let onStart fire.  e.preventDefault() is already called by onStart_ before
      // this function, so taps have no 300ms ghost-click delay.

      const t = e.changedTouches[0];
      if (!t) return false;
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      const tx = (t.clientX - rect.left) * scaleX;
      const ty = (t.clientY - rect.top) * scaleY;

      // ── UPGRADE screen — card tap ──────────────────────────
      // Safety: _btnRects is set during draw(), which always runs before a touch
      // event can be processed (RAF → draw → user sees screen → user lifts finger
      // → touchstart fires).  So the array is always populated when we reach here.
      if (state === STATE.UPGRADE) {
        const rects = UpgradeSystem._btnRects;
        if (rects) {
          for (let i = 0; i < rects.length; i++) {
            const btn = rects[i];
            if (btn && tx >= btn.x && tx <= btn.x + btn.w && ty >= btn.y && ty <= btn.y + btn.h) {
              e.stopPropagation();
              UpgradeSystem.pick(i, player);
              Audio.play('upgrade');
              doWarpAfterUpgrade();
              return true; // cancel onStart
            }
          }
        }
        return true; // tap on upgrade screen but missed a card — still cancel onStart
      }

      // ── START screen — mode arrow buttons ─────────────────
      if (state === STATE.START) {
        const prev = drawStart._modePrevBtn;
        const next = drawStart._modeNextBtn;
        if (prev && tx >= prev.x && tx <= prev.x + prev.w && ty >= prev.y && ty <= prev.y + prev.h) {
          e.stopPropagation();
          gameMode = (gameMode + CFG.modes.length - 1) % CFG.modes.length;
          return true; // cancel onStart (don't start game on mode-change tap)
        }
        if (next && tx >= next.x && tx <= next.x + next.w && ty >= next.y && ty <= next.y + next.h) {
          e.stopPropagation();
          gameMode = (gameMode + 1) % CFG.modes.length;
          return true;
        }
        return false; // tap elsewhere on start screen → let onStart fire (start game)
      }

      // ── GAMEOVER screen ────────────────────────────────────
      if (state !== STATE.GAMEOVER) return false;

      // Check all game-over interactive buttons
      const buttons = [
        { btn: NameInput._submitBtn,      action: () => submitName() },
        { btn: NameInput._restartBtn,     action: () => startGame() },
        { btn: NameInput._leaderboardBtn, action: () => { showingLeaderboard = true; LeaderboardUI.fetchScores(); } },
        { btn: NameInput._backBtn,        action: () => { showingLeaderboard = false; } },
        { btn: NameInput._restartBtn2,    action: () => startGame() },
      ];

      for (const { btn, action } of buttons) {
        if (btn && tx >= btn.x && tx <= btn.x + btn.w && ty >= btn.y && ty <= btn.y + btn.h) {
          e.stopPropagation();
          action();
          return true; // cancel onStart
        }
      }

      // On game over screen but no button hit — if name entry active, focus input
      if (NameInput.active && !NameInput.submitted) {
        if (NameInput._el) NameInput._el.focus();
        return true; // cancel onStart so typing a name doesn't restart the game
      }

      return false; // let onStart proceed (e.g. tap to restart after submission, no button hit)
    },
  });

  canvas.addEventListener('click', e => {
    if (state === STATE.GAMEOVER && NameInput.active && !NameInput.submitted) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      const cx = (e.clientX - rect.left) * scaleX;
      const cy = (e.clientY - rect.top) * scaleY;
      const btn = NameInput._submitBtn;
      if (btn && cx >= btn.x && cx <= btn.x+btn.w && cy >= btn.y && cy <= btn.y+btn.h) {
        e.stopPropagation();
        submitName();
        return;
      }
    }
    if (state === STATE.GAMEOVER && NameInput.submitted && !showingLeaderboard) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      const cx = (e.clientX - rect.left) * scaleX;
      const cy = (e.clientY - rect.top) * scaleY;
      const rb = NameInput._restartBtn;
      const lb = NameInput._leaderboardBtn;
      if (rb && cx >= rb.x && cx <= rb.x+rb.w && cy >= rb.y && cy <= rb.y+rb.h) { e.stopPropagation(); startGame(); return; }
      if (lb && cx >= lb.x && cx <= lb.x+lb.w && cy >= lb.y && cy <= lb.y+lb.h) { e.stopPropagation(); showingLeaderboard = true; LeaderboardUI.fetchScores(); return; }
    }
    if (state === STATE.GAMEOVER && showingLeaderboard) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      const cx = (e.clientX - rect.left) * scaleX;
      const cy = (e.clientY - rect.top) * scaleY;
      const backBtn = NameInput._backBtn;
      const restartBtn2 = NameInput._restartBtn2;
      if (backBtn && cx >= backBtn.x && cx <= backBtn.x+backBtn.w && cy >= backBtn.y && cy <= backBtn.y+backBtn.h) { e.stopPropagation(); showingLeaderboard = false; return; }
      if (restartBtn2 && cx >= restartBtn2.x && cx <= restartBtn2.x+restartBtn2.w && cy >= restartBtn2.y && cy <= restartBtn2.y+restartBtn2.h) { e.stopPropagation(); startGame(); return; }
    }
  });

  // Leaderboard toggle handler
  document.addEventListener('keydown', e => {
    if (state !== STATE.GAMEOVER) return;
    if (e.code === 'KeyL' && NameInput.submitted && !showingLeaderboard) {
      showingLeaderboard = true;
      LeaderboardUI.fetchScores();
    } else if (e.code === 'Escape' && showingLeaderboard) {
      showingLeaderboard = false;
    }
  });

  // Mode selection on start screen (Left/Right arrows)
  document.addEventListener('keydown', e => {
    if (state === STATE.START) {
      if (e.code === 'ArrowLeft')  gameMode = (gameMode + CFG.modes.length - 1) % CFG.modes.length;
      if (e.code === 'ArrowRight') gameMode = (gameMode + 1) % CFG.modes.length;
    }
    // Upgrade picks (1/2/3)
    if (state === STATE.UPGRADE) {
      const idx = ['Digit1','Digit2','Digit3'].indexOf(e.code);
      if (idx >= 0 && idx < UpgradeSystem.cards.length) {
        UpgradeSystem.pick(idx, player);
        Audio.play('upgrade');
        doWarpAfterUpgrade();
      }
    }
  });

  // Upgrade card click/tap
  canvas.addEventListener('click', e => {
    if (state !== STATE.UPGRADE) return;
    const rect = canvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left) * (W / rect.width);
    const cy = (e.clientY - rect.top)  * (H / rect.height);
    UpgradeSystem.cards.forEach((card, i) => {
      const btn = UpgradeSystem._btnRects && UpgradeSystem._btnRects[i];
      if (btn && cx >= btn.x && cx <= btn.x+btn.w && cy >= btn.y && cy <= btn.y+btn.h) {
        UpgradeSystem.pick(i, player);
        Audio.play('upgrade');
        doWarpAfterUpgrade();
      }
    });
  });

  function submitName() {
    if (!NameInput.active || NameInput.submitted) return;
    const name = NameInput.value.trim() || 'PILOT';
    localStorage.setItem('galaxyShooterName', name);
    NameInput.submitted = true;
    NameInput.active    = false;
    if (NameInput._el) NameInput._el.blur();
    NameInput.savedMsg  = 2.5;
    LeaderboardUI.submitScore(name, score, wave);
  }

  // Name-input keydown handler (registered after Input.bind so closure has score/wave)
  document.addEventListener('keydown', e => {
    if (!NameInput.active || NameInput.submitted) return;
    if (e.code === 'Enter') {
      e.stopImmediatePropagation();
      submitName();
      return;
    }
    if (e.code === 'Backspace') {
      NameInput.value = NameInput.value.slice(0, -1);
      e.stopImmediatePropagation();
      return;
    }
    if (/^[a-zA-Z0-9 ]$/.test(e.key) && NameInput.value.length < 12) {
      NameInput.value += e.key.toUpperCase();
      e.stopImmediatePropagation();
    }
  });

  requestAnimationFrame(loop);
})(); // closes Game IIFE

})(); // closes outer strict-mode IIFE
</script>
</body>
</html>
